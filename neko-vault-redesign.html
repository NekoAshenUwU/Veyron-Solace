<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#fbf3ff" />
  <title>Nekoの小金库</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    :root{--ink:#2d2435;--muted:#8a7a94;--green:#65ad83;--red:#df7f85;--line:rgba(105,76,126,.13)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#f9f4ff;font-family:'Noto Sans SC',system-ui,sans-serif;color:var(--ink)}button,input,select,textarea{font-family:inherit}.app{min-height:100vh;width:min(430px,100%);margin:auto;padding:34px 18px 42px;background:radial-gradient(circle at 10% 3%,#ffd9e9 0,transparent 30%),radial-gradient(circle at 92% 5%,#ddccff 0,transparent 28%),linear-gradient(180deg,#fff5fb 0,#f8f1ff 44%,#edf6ff 100%)}
    header{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand{display:flex;gap:12px;align-items:center}.logo{width:56px;height:56px;border-radius:22px;background:linear-gradient(135deg,#fff,#f3e1ff);display:grid;place-items:center;font-size:30px;box-shadow:0 16px 34px rgba(126,85,156,.18),inset 0 1px 0 #fff}h1{margin:0;font-family:'Baloo 2','Noto Sans SC';font-size:34px;line-height:1}.sub{font-size:13px;color:var(--muted);margin-top:4px}.ghost{border:1px solid var(--line);background:rgba(255,255,255,.65);border-radius:99px;padding:10px 12px;color:#715d7e;font-weight:700;box-shadow:0 12px 22px rgba(122,88,164,.1)}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:22px 0 16px;padding:5px;border-radius:24px;background:rgba(255,255,255,.55);border:1px solid var(--line)}.tab{border:0;background:transparent;border-radius:19px;padding:14px;font-size:17px;font-weight:800;color:#806f8b}.tab.on{color:#382846;background:linear-gradient(135deg,#f8ddec,#cdb0eb);box-shadow:0 12px 24px rgba(147,99,181,.22);transform:translateY(-1px)}
    .hero{border-radius:34px;padding:22px;position:relative;overflow:hidden;background:linear-gradient(145deg,#fff,#f6e7ff 48%,#ffe8f1);box-shadow:0 24px 48px rgba(126,85,156,.19),inset 0 1px 0 #fff;border:1px solid rgba(255,255,255,.85)}.hero:after{content:'♡';position:absolute;right:22px;top:0;font-size:98px;color:rgba(122,88,164,.11);font-family:serif}.label{color:#836a91;font-size:13px;font-weight:800}.balance{margin-top:3px;font-family:'Baloo 2';font-size:40px;font-weight:800;letter-spacing:-1.5px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.mini{padding:13px;border-radius:22px;background:rgba(255,255,255,.56);border:1px solid rgba(255,255,255,.75)}.mini span{display:block;font-size:11px;color:#927d9d}.mini b{display:block;margin-top:3px;font-size:19px;font-family:'Baloo 2'}.green{color:var(--green)}.red{color:var(--red)}.budget{margin-top:14px;padding:12px;border-radius:20px;background:rgba(255,255,255,.48)}.budgetTop{display:flex;justify-content:space-between;font-size:12px;color:#786584;margin-bottom:8px}.bar{height:10px;border-radius:99px;background:rgba(122,88,164,.12);overflow:hidden}.fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#b995dd,#ef9dbd)}
    .panel{margin-top:16px;border-radius:30px;padding:18px;background:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.78);box-shadow:0 18px 42px rgba(94,66,119,.12);backdrop-filter:blur(14px)}.head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.title{font-size:18px;font-weight:900}.hint{font-size:12px;color:var(--muted);margin-top:2px}.seg{display:flex;gap:7px;padding:5px;background:#f3edf7;border-radius:18px}.seg button{border:0;border-radius:14px;padding:9px 13px;background:transparent;color:#806d8b;font-weight:900}.seg button.on{background:linear-gradient(135deg,#a785cf,#e69cbd);color:white;box-shadow:0 9px 18px rgba(169,121,194,.28)}
    .amountBox{display:flex;align-items:center;gap:10px;margin:10px 0 14px;padding:14px 16px;border-radius:26px;background:linear-gradient(135deg,#fff,#fff7fb);border:1px solid rgba(158,118,188,.18)}.cur{font-size:18px;color:#8f789c;font-family:'Baloo 2'}.amount{flex:1;border:0;background:transparent;outline:0;font-family:'Baloo 2';font-size:36px;font-weight:800;width:100%;color:#2d2435;padding:0}.amount::placeholder{color:#d0c5d6}.chips{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.chip{border:0;border-radius:18px;padding:10px 4px;background:#f7f1fa;color:#6d5b78;font-weight:800;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;min-height:58px}.chip.on{background:var(--c);color:#34283d;box-shadow:0 12px 20px rgba(101,73,123,.14);transform:translateY(-1px)}.chip i{font-style:normal;font-size:18px}.form{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:flex;flex-direction:column;gap:7px;font-size:12px;color:#8a7894;font-weight:800}.span{grid-column:1/-1}input,select,textarea{width:100%;border:1px solid rgba(111,78,132,.16);outline:0;border-radius:17px;background:rgba(255,255,255,.78);color:#34283d;padding:12px 13px;font:inherit;font-size:14px}textarea{resize:vertical;min-height:74px}input:focus,select:focus,textarea:focus{border-color:rgba(169,133,207,.7);box-shadow:0 0 0 4px rgba(185,149,221,.16)}
    .primary{width:100%;border:0;margin-top:14px;padding:15px;border-radius:22px;color:white;font-size:16px;font-weight:900;background:linear-gradient(135deg,#a886cf,#ea9bbc);box-shadow:0 14px 28px rgba(167,117,196,.32)}.secondary{border:0;border-radius:99px;padding:8px 11px;background:#f1eaf5;color:#7a6488;font-weight:800}.list{display:flex;flex-direction:column;gap:10px}.record{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:13px;border-radius:22px;background:rgba(255,255,255,.69);border:1px solid rgba(255,255,255,.8)}.recIcon{width:42px;height:42px;border-radius:16px;background:var(--bg);display:grid;place-items:center}.recTitle{font-weight:900}.recMeta{font-size:12px;color:var(--muted);margin-top:3px}.amt{text-align:right;font-family:'Baloo 2';font-size:17px;font-weight:900}.actions{display:flex;gap:6px;justify-content:flex-end;margin-top:5px}.iconBtn{border:0;background:#f3edf7;color:#786584;border-radius:99px;padding:5px 8px;font-size:11px;font-weight:800}.empty{text-align:center;padding:28px 18px;border-radius:24px;background:rgba(255,255,255,.44);border:1px dashed rgba(122,88,164,.18);color:var(--muted)}.emptyIcon{font-size:34px}.reviewCard{padding:14px;border-radius:24px;background:rgba(255,255,255,.74);border:1px solid rgba(255,255,255,.82);display:grid;grid-template-columns:1fr auto;gap:12px}.badge{display:inline-block;border-radius:99px;padding:5px 10px;font-size:11px;font-weight:900;background:var(--bb);color:var(--bc)}.reviewTitle{margin-top:8px;font-size:16px;font-weight:900}.reviewMeta{color:var(--muted);font-size:12px;margin-top:4px}.reviewNote{font-size:13px;color:#5d4c68;line-height:1.6}.thumb{width:74px;height:74px;border-radius:20px;object-fit:cover;background:#f3edf7;display:grid;place-items:center}.stars{display:flex;gap:7px;flex-wrap:wrap}.star{border:0;width:34px;height:34px;border-radius:13px;background:#f3edf7;color:#b6a7be;font-size:16px}.star.on{background:#fff1c7;color:#d7972f}.photoPreview{width:100%;max-height:150px;object-fit:cover;border-radius:20px;margin-top:10px}.tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.bars{display:flex;flex-direction:column;gap:9px}.barRow{display:grid;grid-template-columns:72px 1fr 72px;gap:8px;align-items:center;font-size:12px;color:#756381}.tiny{height:8px;border-radius:99px;background:#f0e8f4;overflow:hidden}.tiny div{height:100%;background:var(--col)}@media(max-width:370px){.app{padding-left:13px;padding-right:13px}.chips{grid-template-columns:repeat(3,1fr)}.form{grid-template-columns:1fr}h1{font-size:29px}}
  </style>
</head>
<body>
  <main class="app">
    <header><div class="brand"><div class="logo">🐱</div><div><h1>Nekoの小金库</h1><div class="sub">马币记账 · 好用/避雷记录 · 本地保存</div></div></div><button class="ghost" id="exportBtn">导出</button></header>
    <nav class="tabs"><button id="bookTab" class="tab on">记账</button><button id="reviewTab" class="tab">评价</button></nav>
    <section id="bookView"></section><section id="reviewView" style="display:none"></section>
  </main>
<script>
const BOOK_KEY='tyn-book-data', REVIEW_KEY='tyn-review-data', PREF_KEY='neko-vault-preferences';
const expenseCats=[['餐饮','🍜','#F3A7A755'],['网购','🛍️','#C5A2E055'],['交通','🚗','#99B9EA55'],['娱乐','🎮','#F2C36B55'],['生活','🧴','#9CCFB555'],['医疗','💊','#A6CBE255'],['礼物','🎁','#E7A7C955'],['其他','✨','#BDB4CB55']];
const incomeCats=[['家用','🏠','#8CCFAE55'],['工资','💼','#8FBFEA55'],['兼职','🌙','#C4A0E555'],['红包','🧧','#ED9C9C55'],['退款','↩️','#B6C58D55'],['其他','✨','#BDB4CB55']];
const methods=['Bank Transfer','E-Wallet','支付宝','银行卡','现金']; const reviewTypes=['外卖','网购','超市','餐厅','服务','其他'];
let entries=load(BOOK_KEY,[]).map(normEntry), reviews=load(REVIEW_KEY,[]).map(normReview), prefs=load(PREF_KEY,{}), month=prefs.month||new Date().toISOString().slice(0,7), budget=Number(prefs.budget||1200), tab='book';
let form={date:today(),type:'支出',amount:'',category:'餐饮',payment:'Bank Transfer',detail:''}; let editId=null; let rf={type:'外卖',time:'',place:'',store:'',item:'',stars:'4',note:'',photo:null};
function load(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}} function save(){localStorage.setItem(BOOK_KEY,JSON.stringify(entries));localStorage.setItem(REVIEW_KEY,JSON.stringify(reviews));localStorage.setItem(PREF_KEY,JSON.stringify({month,budget}))} function today(){return new Date().toISOString().slice(0,10)} function money(v){return 'RM '+Number(v||0).toFixed(2)} function normEntry(x){return {id:x.id||Date.now(),month:x.month||(x.date||today()).slice(0,7),date:x.date||today(),type:x.type||'支出',amount:Number(x.amount||x.income||x.expense||0),category:x.category||'其他',payment:x.payment||'Bank Transfer',detail:x.detail||''}} function normReview(x){return {id:x.id||Date.now(),type:x.type||'外卖',time:x.time||'',place:x.place||'',store:x.store||'',item:x.item||'',stars:String(x.stars||3),note:x.note||'',photo:x.photo||null}} function catMeta(name,type='支出'){return (type==='收入'?incomeCats:expenseCats).find(x=>x[0]===name)||expenseCats.at(-1)}
function render(){save();document.getElementById('bookTab').className=tab==='book'?'tab on':'tab';document.getElementById('reviewTab').className=tab==='review'?'tab on':'tab';document.getElementById('bookView').style.display=tab==='book'?'block':'none';document.getElementById('reviewView').style.display=tab==='review'?'block':'none';renderBook();renderReview()}
function setForm(k,v,refresh=true){form[k]=v;if(k==='type')form.category=v==='收入'?'家用':'餐饮';if(refresh)render()} function setRf(k,v,refresh=true){rf[k]=v;if(refresh)render()}
function renderBook(){const list=entries.filter(x=>x.month===month);const income=list.filter(x=>x.type==='收入').reduce((s,x)=>s+x.amount,0);const expense=list.filter(x=>x.type==='支出').reduce((s,x)=>s+x.amount,0);const progress=Math.min(100,budget?expense/budget*100:0);const cats={};list.filter(x=>x.type==='支出').forEach(x=>cats[x.category]=(cats[x.category]||0)+x.amount);const top=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,4);const catsPool=form.type==='收入'?incomeCats:expenseCats;document.getElementById('bookView').innerHTML=`<section class="hero"><div class="label">${month} · 小金库结余</div><div class="balance">${money(income-expense)}</div><div class="grid2"><div class="mini"><span>本月收入</span><b class="green">${money(income)}</b></div><div class="mini"><span>本月支出</span><b class="red">${money(expense)}</b></div></div><div class="budget"><div class="budgetTop"><span>预算进度 ${Math.round(progress)}%</span><span>${money(expense)} / ${money(budget)}</span></div><div class="bar"><div class="fill" style="width:${progress}%"></div></div></div></section><section class="panel"><div class="head"><div><div class="title">快速记一笔</div><div class="hint">金额最大，分类点一下就好</div></div><div class="seg"><button onclick="setForm('type','支出')" class="${form.type==='支出'?'on':''}">支出</button><button onclick="setForm('type','收入')" class="${form.type==='收入'?'on':''}">收入</button></div></div><div class="amountBox"><span class="cur">RM</span><input class="amount" inputmode="decimal" value="${form.amount}" oninput="setForm('amount',this.value,false)" placeholder="0.00"></div><div class="chips">${catsPool.map(c=>`<button class="chip ${form.category===c[0]?'on':''}" style="--c:${c[2]}" onclick="setForm('category','${c[0]}')"><i>${c[1]}</i><span>${c[0]}</span></button>`).join('')}</div><div class="form"><label class="field">日期<input type="date" value="${form.date}" onchange="setForm('date',this.value,false)"></label><label class="field">付款方式<select onchange="setForm('payment',this.value,false)">${methods.map(x=>`<option ${form.payment===x?'selected':''}>${x}</option>`).join('')}</select></label><label class="field span">备注<textarea oninput="setForm('detail',this.value,false)" placeholder="例如：奶茶、Shopee、小鸡腿、家用收入…">${form.detail}</textarea></label></div><button class="primary" onclick="saveEntry()">${editId?'保存修改':'存进小金库'}</button>${editId?'<button class="secondary" style="margin-top:10px;width:100%" onclick="resetEntry()">取消编辑</button>':''}</section><section class="panel"><div class="head"><div><div class="title">本月概览</div><div class="hint">看一眼钱都流去哪里了</div></div><input style="max-width:120px" value="${month}" onchange="month=this.value;render()"></div><label class="field span">月预算<input inputmode="decimal" value="${budget}" onchange="budget=Number(this.value||0);render()"></label><div class="bars" style="margin-top:14px">${top.length?top.map(([n,v])=>{let m=catMeta(n);return `<div class="barRow"><span>${m[1]} ${n}</span><div class="tiny"><div style="width:${Math.min(100,v/Math.max(expense,1)*100)}%;--col:${m[2].replace('55','')}"></div></div><b>${money(v)}</b></div>`}).join(''):'<div class="empty"><div class="emptyIcon">👛</div><b>还没有支出分类</b><p>记下第一笔之后，这里会自动变成漂亮的小统计。</p></div>'}</div></section><section class="panel"><div class="head"><div><div class="title">最近记录</div><div class="hint">可以编辑，也可以删掉记错的</div></div></div><div class="list">${list.slice().sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,8).map(x=>{let m=catMeta(x.category,x.type);return `<div class="record"><div class="recIcon" style="--bg:${m[2]}">${m[1]}</div><div><div class="recTitle">${x.detail||x.category}</div><div class="recMeta">${x.date} · ${x.category} · ${x.payment}</div></div><div><div class="amt ${x.type==='收入'?'green':'red'}">${x.type==='收入'?'+':'-'}${money(x.amount)}</div><div class="actions"><button class="iconBtn" onclick="editEntry(${x.id})">编辑</button><button class="iconBtn" onclick="delEntry(${x.id})">删除</button></div></div></div>`}).join('')||'<div class="empty"><div class="emptyIcon">🧁</div><b>这个月还空空的</b><p>先记一笔今天的小花费，小金库就开始长大啦。</p></div>'}</div><div class="tools"><button class="secondary" onclick="exportData()">导出 JSON</button><button class="secondary" onclick="entries=[];render()">清空记账</button></div></section>`}
function saveEntry(){const amount=Number(form.amount);if(!amount||amount<=0)return;const item=normEntry({...form,amount,month:form.date.slice(0,7)});if(editId){entries=entries.map(x=>x.id===editId?{...item,id:editId}:x)}else entries=[{...item,id:Date.now()},...entries];month=item.month;resetEntry()}function resetEntry(){editId=null;form={date:today(),type:form.type,amount:'',category:form.type==='收入'?'家用':'餐饮',payment:'Bank Transfer',detail:''};render()}function editEntry(id){let x=entries.find(e=>e.id===id);if(!x)return;editId=id;form={date:x.date,type:x.type,amount:String(x.amount),category:x.category,payment:x.payment,detail:x.detail};scrollTo({top:0,behavior:'smooth'});render()}function delEntry(id){entries=entries.filter(x=>x.id!==id);render()}
function renderReview(){document.getElementById('reviewView').innerHTML=`<section class="panel"><div class="head"><div><div class="title">好用 / 避雷卡片</div><div class="hint">外卖、网购、超市都可以留档</div></div></div><div class="form"><label class="field">类型<select onchange="setRf('type',this.value,false)">${reviewTypes.map(x=>`<option ${rf.type===x?'selected':''}>${x}</option>`).join('')}</select></label><label class="field">时间<input type="datetime-local" value="${rf.time}" onchange="setRf('time',this.value,false)"></label><label class="field">地点<input value="${rf.place}" oninput="setRf('place',this.value,false)" placeholder="KK / Imago / Shopee"></label><label class="field">店家 / 平台<input value="${rf.store}" oninput="setRf('store',this.value,false)" placeholder="店家或平台"></label><label class="field span">商品 / 菜品<input value="${rf.item}" oninput="setRf('item',this.value,false)" placeholder="mushroom burger / 奶茶 / 裙子"></label><label class="field span">星级<div class="stars">${[1,2,3,4,5].map(n=>`<button class="star ${Number(rf.stars)>=n?'on':''}" onclick="setRf('stars','${n}')">★</button>`).join('')}</div></label><label class="field span">备注<textarea oninput="setRf('note',this.value,false)" placeholder="好吃在哪里？踩雷在哪里？下次还买吗？">${rf.note}</textarea></label><label class="field span">图片留档<input type="file" accept="image/*" onchange="readImg(this.files[0])">${rf.photo?`<img class="photoPreview" src="${rf.photo}">`:''}</label></div><button class="primary" onclick="saveReview()">保存评价卡片</button></section><section class="panel"><div class="head"><div><div class="title">评价收藏夹</div><div class="hint">高分适合回购，低分自动变避雷</div></div></div><div class="list">${reviews.slice().sort((a,b)=>b.id-a.id).map(r=>{let s=Number(r.stars||0),lab=s>=4?'值得回购':s<=2?'避雷记录':'普通体验',bb=s>=4?'#dff3e7':s<=2?'#ffe1e2':'#fff1cf',bc=s>=4?'#447b5a':s<=2?'#a94e57':'#967234';return `<div class="reviewCard" style="--bb:${bb};--bc:${bc}"><div><span class="badge">${lab}</span><div class="reviewTitle">${r.store} · ${r.item}</div><div class="reviewMeta">${r.type} · ${r.place||'未填地点'} · ${'★'.repeat(s)}${'☆'.repeat(5-s)}</div>${r.note?`<p class="reviewNote">${r.note}</p>`:''}<div class="actions" style="justify-content:flex-start"><button class="iconBtn" onclick="delReview(${r.id})">删除</button></div></div>${r.photo?`<img class="thumb" src="${r.photo}">`:'<div class="thumb">🐾</div>'}</div>`}).join('')||'<div class="empty"><div class="emptyIcon">⭐</div><b>还没有评价卡片</b><p>下次吃到好吃的、买到好用的，或者踩雷了，就存到这里。</p></div>'}</div><div class="tools"><button class="secondary" onclick="reviews=[];render()">清空评价</button></div></section>`}
function readImg(file){if(!file)return;let r=new FileReader();r.onload=()=>{rf.photo=r.result;render()};r.readAsDataURL(file)}function saveReview(){if(!rf.store.trim()||!rf.item.trim())return;reviews=[{...normReview(rf),id:Date.now()},...reviews];rf={type:rf.type,time:'',place:'',store:'',item:'',stars:'4',note:'',photo:null};render()}function delReview(id){reviews=reviews.filter(x=>x.id!==id);render()}function exportData(){let blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),entries,reviews,budget},null,2)],{type:'application/json'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download=`neko-vault-${today()}.json`;a.click();URL.revokeObjectURL(url)}
document.getElementById('bookTab').onclick=()=>{tab='book';render()};document.getElementById('reviewTab').onclick=()=>{tab='review';render()};document.getElementById('exportBtn').onclick=exportData;render();
</script>
</body>
</html>
