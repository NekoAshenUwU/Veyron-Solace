<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FinelyCup · 梵妳卡波 代理账本</title>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FinelyCup" />
  <meta name="theme-color" content="#070812" />
  <link rel="manifest" id="pwaManifest" />
  <style>
    :root{
      --bg:#070812;
      --card: rgba(18, 20, 34, .78);
      --card2: rgba(12, 14, 26, .72);
      --text:#eaf0ff;
      --muted:#aeb7d6;
      --line: rgba(80, 92, 150, .28);
      --accent:#8b5cf6;
      --accent2:#22c55e;
      --warn:#f59e0b;
      --danger:#ef4444;
      --shadow: 0 14px 40px rgba(0,0,0,.38);
      --r: 18px;
      --pad: 14px;
      --pad2: 18px;
      --max: 1020px;
      --cute1: #ff6aa2;
      --cute2: #7dd3fc;
      --cute3: #a7f3d0;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    [data-theme="macaron"]{
      --bg:#fdf4ff;
      --card: rgba(255, 248, 255, .92);
      --card2: rgba(248, 240, 255, .88);
      --text:#1a1030;
      --muted:#7c5a8a;
      --line: rgba(180, 120, 220, .18);
      --accent:#c084fc;
      --accent2:#34d399;
      --warn:#fb923c;
      --danger:#f43f5e;
      --shadow: 0 12px 36px rgba(160, 80, 200, .14);
      --cute1:#f9a8d4;
      --cute2:#c084fc;
      --cute3:#93c5fd;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(900px 520px at 14% -10%, rgba(139,92,246,.26), transparent 60%),
        radial-gradient(820px 520px at 118% 18%, rgba(34,197,94,.16), transparent 55%),
        radial-gradient(820px 520px at 65% 110%, rgba(125,211,252,.14), transparent 60%),
        var(--bg);
      padding-bottom: calc(180px + env(safe-area-inset-bottom));
    }
    [data-theme="macaron"] body{
      background:
        radial-gradient(900px 520px at 14% -10%, rgba(249,168,212,.32), transparent 60%),
        radial-gradient(820px 520px at 118% 18%, rgba(147,197,253,.28), transparent 55%),
        radial-gradient(820px 520px at 50% 110%, rgba(192,132,252,.22), transparent 60%),
        var(--bg);
    }
    header{
      position: sticky; top:0; z-index: 9;
      backdrop-filter: blur(16px);
      background: color-mix(in srgb, var(--bg) 78%, transparent);
      border-bottom: 1px solid var(--line);
    }
    .wrap{max-width: var(--max); margin: 0 auto; padding: 14px 14px;}
    .topbar{display:flex; align-items:center; gap:12px; justify-content:space-between;}
    .brand{display:flex; gap:10px; align-items:center; min-width:0;}
    .logo{
      width:40px; height:40px; border-radius: 16px;
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 92%, white 8%), color-mix(in srgb, var(--cute2) 78%, white 22%));
      box-shadow: var(--shadow);
      position:relative;
      overflow:hidden;
    }
    .logo:after{
      content:"✦";
      position:absolute; right:10px; top:8px;
      opacity:.55;
      font-weight:900;
      transform: rotate(12deg);
    }
    [data-theme="macaron"] .logo:after{content:"🐾";}
    .title{display:flex; flex-direction:column; gap:2px; min-width:0;}
    .title h1{
      font-size:15px; margin:0; letter-spacing:.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .title p{margin:0; font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      font-size:12px; color:var(--muted);
      padding:8px 10px; border:1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--card) 80%, transparent);
      user-select:none;
      white-space:nowrap;
    }
    .pill b{color:var(--text); font-weight:800;}
    .pill .dot{width:8px;height:8px;border-radius:999px;background:var(--accent2); display:inline-block; box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent2) 20%, transparent);}
    .btn{
      appearance:none; border: 1px solid var(--line);
      background: color-mix(in srgb, var(--card) 82%, transparent);
      color:var(--text);
      padding: 10px 12px;
      border-radius: 14px;
      font-weight: 750;
      cursor: pointer;
      display:inline-flex; align-items:center; gap:8px;
      user-select:none;
      box-shadow: 0 8px 22px rgba(0,0,0,.12);
    }
    [data-theme="macaron"] .btn{box-shadow: 0 8px 22px rgba(18, 20, 40, .10);}
    .btn:active{transform: translateY(1px);}
    .btn.primary{
      border-color: color-mix(in srgb, var(--accent) 55%, transparent);
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 92%, white 8%), color-mix(in srgb, var(--accent) 50%, transparent));
    }
    .btn.good{
      border-color: color-mix(in srgb, var(--accent2) 55%, transparent);
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent2) 90%, white 10%), color-mix(in srgb, var(--accent2) 42%, transparent));
    }
    .btn.warn{
      border-color: color-mix(in srgb, var(--warn) 55%, transparent);
      background: linear-gradient(135deg, color-mix(in srgb, var(--warn) 88%, white 12%), color-mix(in srgb, var(--warn) 42%, transparent));
    }
    .btn.danger{
      border-color: color-mix(in srgb, var(--danger) 55%, transparent);
      background: linear-gradient(135deg, color-mix(in srgb, var(--danger) 88%, white 12%), color-mix(in srgb, var(--danger) 42%, transparent));
    }
    .btn.ghost{background: rgba(255,255,255,.06); box-shadow:none; border:1px solid rgba(255,255,255,.22); color: var(--text);} .btn.ghost:active{transform:scale(.98);}
    main{padding: 12px 0;}
    .grid{display:grid; gap:12px;}
    .card{
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
    }
    .card .hd{
      display:flex; align-items:center; justify-content:space-between;
      padding: var(--pad2);
      border-bottom: 1px solid var(--line);
      gap:10px;
      flex-wrap:wrap;
    }
    .card .hd h2{margin:0; font-size:14px;}
    .card .hd .sub{margin:0; font-size:12px; color:var(--muted);}
    .card .bd{padding: var(--pad2);}
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;}
    .row > *{flex:1 1 180px;}
    label{display:block; font-size:12px; color:var(--muted); margin: 0 0 8px;}
    input, select, textarea{
      width:100%;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 78%, transparent);
      color:var(--text);
      outline: none;
    }
    [data-theme="macaron"] input, [data-theme="macaron"] select, [data-theme="macaron"] textarea{
      background: rgba(255,255,255,.88);
      color: var(--text);
    }
    textarea{min-height: 88px; resize: vertical;}
    input[type="date"]{padding: 10px 12px;}
    .muted{color:var(--muted)}
    .divider{height:1px; background: var(--line); margin: 12px 0;}
    .kpi{display:flex; gap:12px; flex-wrap:wrap;}
    .kpi .box{
      flex: 1 1 200px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 72%, transparent);
    }
    [data-theme="macaron"] .kpi .box{background: rgba(255,255,255,.72);}
    .kpi .box .t{font-size:12px; color:var(--muted); margin:0 0 6px;}
    .kpi .box .v{font-size:18px; font-weight:900; margin:0;}
    .money{font-family: var(--mono);}
    .pos{color: var(--accent2);}
    .neg{color: var(--danger);}
    .warnc{color: var(--warn);}
    .tag{
      font-size:11px; padding: 4px 8px; border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--card) 72%, transparent);
      color: var(--muted);
      user-select:none;
      white-space:nowrap;
    }
    .list{display:grid; gap:10px;}
    .item{
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 74%, transparent);
      border-radius: 16px;
      padding: 12px 14px;
      display:flex; justify-content:space-between; gap:12px;
      cursor: pointer;
      align-items:flex-start;
    }
    [data-theme="macaron"] .item{background: rgba(255,255,255,.74);}
    .item:active{transform: translateY(1px);}
    .item .a{display:flex; flex-direction:column; gap:6px; min-width: 0;}
    .item .a .name{font-weight:900; font-size:14px; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .item .a .meta{font-size:12px; color:var(--muted); margin:0; display:flex; gap:8px; flex-wrap:wrap;}
    .item .b{display:flex; flex-direction:column; gap:6px; align-items:flex-end;}
    .hint{font-size:12px; color:var(--muted); margin: 8px 0 0;}
    .small{font-size:12px;}
    .seg{
      display:flex; gap:8px; padding:6px;
      border:1px solid var(--line);
      border-radius: 16px;
      background: color-mix(in srgb, var(--card) 72%, transparent);
    }
    .seg .sbtn{
      flex:1;
      padding: 10px 10px;
      border-radius: 12px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      cursor:pointer;
      font-weight: 900;
      user-select:none;
    }
    .seg .sbtn.active{
      color: var(--text);
      border-color: color-mix(in srgb, var(--accent) 55%, transparent);
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 42%, transparent), color-mix(in srgb, var(--card) 72%, transparent));
    }
    .fab{
      position: fixed;
      right: 16px;
      bottom: 94px;
      z-index: 9;
      border-radius: 999px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
    }
    .bottomnav{
      position: fixed; left:0; right:0; bottom:0; z-index: 10;
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--line);
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
    }
    .tabs{
      max-width: var(--max); margin: 0 auto;
      display:grid; grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }
    .tab{
      padding: 10px 8px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--card) 70%, transparent);
      text-align:center;
      font-size:12px;
      color: var(--muted);
      cursor:pointer;
      user-select:none;
      font-weight: 850;
      white-space:nowrap;
    }
    .tab.active{
      color: var(--text);
      border-color: color-mix(in srgb, var(--accent) 55%, transparent);
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 42%, transparent), color-mix(in srgb, var(--card) 72%, transparent));
    }
    .modal{
      position: fixed; inset:0; z-index: 1000;
      display:none;
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(6px);
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
    }
    [data-theme="macaron"] .modal{background: rgba(18,20,40,.28);}
    
.modal.paper{align-items:flex-start;}
.modal.paper .box{max-width:980px;}
.modal.paper .sheet{
  background:#fff !important;
  color:#0b0b0b !important;
  border-color:#e5e7eb !important;
  box-shadow:0 18px 60px rgba(0,0,0,.35);
}
.modal.paper .shd, .modal.paper .sft{background:#f8fafc !important; border-color:#e5e7eb !important;}
.modal.paper .sub{color:#475569 !important;}
.modal.paper .table{border-color:#e5e7eb !important;}
.modal.paper .table th{background:#f1f5f9 !important; color:#334155 !important;}
.modal.paper .table td{border-color:#e5e7eb !important;}
.modal.paper .pill{background:#f1f5f9 !important; border-color:#e5e7eb !important; color:#0f172a !important;}

.modal.show{display:flex; align-items:flex-start; justify-content:center;}
    .sheet{
      width: min(var(--max), calc(100vw - 28px));
      max-height: calc(100dvh - 62px - env(safe-area-inset-bottom));
      margin-top: 34px;
      border-radius: 22px;
      overflow:hidden;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--card), color-mix(in srgb, var(--bg) 78%, transparent));
      box-shadow: 0 20px 70px rgba(0,0,0,.55);
      display:flex; flex-direction:column;
    }
    .shd{
      padding: 14px 16px;
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid var(--line);
      flex-wrap:wrap;
      flex: 0 0 auto;
    }
    .shd h3{margin:0; font-size:14px;}
    .sbd{
      padding: 16px 16px 22px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      flex: 1 1 auto;
    }
    .sft{
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
      display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap;
      border-top: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 74%, transparent);
      flex: 0 0 auto;
    }
    [data-theme="macaron"] .sft{background: rgba(255,255,255,.55);}

    .table{
      width:100%;
      border-collapse: collapse;
      font-size:12px;
      overflow:hidden;
      border-radius: 16px;
      border: 1px solid var(--line);
    }
    .table th, .table td{
      padding: 10px 10px;
      border-bottom: 1px solid var(--line);
      text-align:left;
      vertical-align: top;
    }
    .table th{
      color: var(--muted);
      font-weight: 900;
      background: color-mix(in srgb, var(--bg) 74%, transparent);
    }
    [data-theme="macaron"] .table th{background: rgba(255,255,255,.78);}
    .table tr:last-child td{border-bottom:none;}

    @media (min-width: 900px){
      .fab{right: calc(50% - var(--max)/2 + 16px);}
    }
  
/* ===== Statement fullscreen & print ===== */
.statementOverlay{position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,.62); display:flex; flex-direction:column;}
.statementSheet{margin:0; background:#fff; color:#0c0f14; border-radius:18px 18px 0 0; overflow:auto; -webkit-overflow-scrolling:touch; flex:1;}
.statementTopbar{position:sticky; top:0; background:#fff; z-index:5; padding:12px 12px 10px; border-bottom:1px solid rgba(0,0,0,.08); display:flex; gap:10px; align-items:center; justify-content:space-between;}
.statementTopbar .hint{font-size:12px; color:#667; line-height:1.2;}
.statementTopbar .sbtn{padding:10px 14px; border-radius:14px; border:1px solid rgba(0,0,0,.12); background:#fff; font-weight:900;}
.statementTopbar .sbtn.primary{background:#0d1728; color:#fff; border-color:#0d1728;}
.statementBody{padding:14px 12px 22px;}
.statementTitle{font-size:28px; font-weight:950; margin:6px 0 6px;}
.statementMeta{font-size:14px; color:#111; margin-bottom:12px; display:flex; flex-wrap:wrap; gap:12px; font-weight:950;}
.statementCards{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:10px 0 14px;}
.statementCard{border:1px solid rgba(0,0,0,.08); border-radius:16px; padding:12px;}
.statementCard .k{font-size:13px;color:#556;}
.statementCard .v{font-size:28px;font-weight:950; margin-top:6px;}
.statementCard .v.green{color:#0a7b55;}
.statementCard .v.orange{color:#a45900;}
.statementCard .v.red{color:#b10a0a;}
.statementInput{width:100%; padding:10px 12px; border-radius:12px; border:1px solid rgba(0,0,0,.14); font-size:16px; margin-top:8px;}
.statementTable{width:100%; border-collapse:separate; border-spacing:0; overflow:hidden; border-radius:14px; border:1px solid rgba(0,0,0,.10); table-layout:fixed;}
.statementTable th{background:#f3f5f7; text-align:left; font-size:12px; padding:10px 10px; color:#334;}
.statementTable td{padding:10px 10px; font-size:12px; vertical-align:top; border-top:1px solid rgba(0,0,0,.06);}
.statementTable td.amount{font-weight:900; white-space:nowrap;}
.statementTable td.calc{color:#556; white-space:nowrap;}
.statementTable td.desc{word-break:break-word;}

/* column widths (desktop) */
.statementTable th.col-seq{width:44px;}
.statementTable th.col-calc{width:110px;}
.statementTable th.col-amt{width:116px;}
.statementTable th.col-cum{width:116px;}

.stmtDateRow td{background:#f7f8fa; color:#556; font-weight:950; font-size:12px; padding:8px 10px; border-top:1px solid rgba(0,0,0,.06);} 
@media (max-width:420px){
  .statementCard .v{font-size:24px;}
  .statementTable td,.statementTable th{font-size:11px; padding:9px 8px;}
  .statementTable th.col-seq{width:38px;}
  .statementTable th.col-calc{width:74px;}
  .statementTable th.col-amt{width:88px;}
  .statementTable th.col-cum{width:88px;}
  .statementTable td.calc{white-space:normal;}
  .statementTopbar .hint{display:none;}
}
body.printing .wrap, body.printing .bottomnav, body.printing .fab, body.printing .toastwrap, body.printing .modal{display:none !important;}
@media print{
  body{background:#fff;}
  .statementOverlay{position:static; inset:auto; background:#fff;}
  .statementTopbar{display:none !important;}
  .statementSheet{border-radius:0; overflow:visible;}
  .statementBody{padding:12mm;}
}


/* Reports table header readability on mobile */
.reportsTable th{
  font-size: 12px;
  line-height: 1.15;
  padding: 10px 6px;
  white-space: normal;
}
@media (max-width: 420px){
  .reportsTable th{ font-size: 11px; }
}

/* ===== Galaxy Stars Background ===== */
#starsBg{
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
#starsBg .star{
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle var(--dur,3s) ease-in-out infinite;
  animation-delay: var(--delay,0s);
  opacity: 0;
}
@keyframes twinkle{
  0%,100%{ opacity: 0; transform: scale(0.8); }
  50%{ opacity: var(--max-op, 0.7); transform: scale(1); }
}
[data-theme="macaron"] #starsBg{ display:none; }

/* ===== Logo animation ===== */
.logo-wrap{
  width:40px; height:40px; border-radius: 16px;
  position: relative; overflow: visible;
  flex-shrink: 0;
}
.logo-inner{
  width:40px; height:40px; border-radius: 16px;
  background: linear-gradient(135deg, #8b5cf6, #22c55e 130%);
  box-shadow: var(--shadow);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  transition: background 0.4s;
}
[data-theme="macaron"] .logo-inner{
  background: linear-gradient(135deg, #f9a8d4, #c084fc 70%, #93c5fd 130%);
}
.logo-paw{
  font-size: 22px;
  line-height: 1;
  position: relative; z-index: 1;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.28));
}
.logo-sparkles{
  position: absolute; inset: 0; pointer-events: none;
}
.logo-sparkle{
  position: absolute;
  font-size: 8px;
  animation: sparkle-pop 2s ease-in-out infinite;
  animation-delay: var(--sd, 0s);
  opacity: 0;
}
@keyframes sparkle-pop{
  0%,100%{ opacity:0; transform: scale(0) rotate(0deg); }
  40%,60%{ opacity:1; transform: scale(1) rotate(20deg); }
}

/* ===== Splash screen ===== */
#splash{
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(160deg, #070812 0%, #0f0620 60%, #0a1428 100%);
  transition: opacity 0.5s ease, visibility 0.5s ease;
}
#splash.hide{ opacity: 0; visibility: hidden; }
.splash-paw{
  font-size: 64px;
  animation: paw-appear 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
  opacity: 0;
  position: relative;
}
@keyframes paw-appear{
  0%{ opacity:0; transform: scale(0.3) rotate(-20deg); }
  100%{ opacity:1; transform: scale(1) rotate(0deg); }
}
.splash-flowers{
  display: flex; gap: 12px; margin-top: 10px;
  height: 36px; align-items: center;
}
.splash-flower{
  font-size: 20px;
  opacity: 0;
  animation: flower-pop 0.5s cubic-bezier(.34,1.56,.64,1) forwards;
  animation-delay: var(--fd, 0.8s);
}
@keyframes flower-pop{
  0%{ opacity:0; transform: scale(0) translateY(12px); }
  100%{ opacity:1; transform: scale(1) translateY(0); }
}
.splash-brand{
  margin-top: 28px;
  font-size: 26px; font-weight: 900;
  background: linear-gradient(90deg, #f9a8d4, #c084fc, #93c5fd);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0;
  animation: fade-up 0.5s ease forwards;
  animation-delay: 1.3s;
}
.splash-sub{
  margin-top: 6px;
  font-size: 14px; color: rgba(200,180,230,.65);
  opacity: 0;
  animation: fade-up 0.5s ease forwards;
  animation-delay: 1.5s;
}
@keyframes fade-up{
  0%{ opacity:0; transform: translateY(12px); }
  100%{ opacity:1; transform: translateY(0); }
}

<script>
/* ===== Storage (Local only) ===== */
const STORE_KEY = 'beingfine_finelycup_ledger_v4';
const uid = ()=> Math.random().toString(16).slice(2) + Date.now().toString(16);
const todayISO = ()=> new Date().toISOString().slice(0,10);
// Robust date comparator: supports YYYY-MM-DD / YYYY/MM/DD / etc
function _dateKey(s){
  if(!s) return 0;
  const m = String(s).match(/(\d{4})\D?(\d{1,2})\D?(\d{1,2})/);
  if(!m) return 0;
  const y = Number(m[1])||0;
  const mo = Number(m[2])||0;
  const d = Number(m[3])||0;
  return y*10000 + mo*100 + d;
}
function cmpDate(a,b){
  return _dateKey(a) - _dateKey(b);
}
const safe = (v)=> (v??'').toString().replace(/[<>&"]/g, s => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[s]));
const fmtMoney = (n)=> (Number(n||0)).toFixed(2);

// ---------- compatibility helpers (mobile chrome, older code paths) ----------
function fmt2(n){
  const x = Number(n ?? 0);
  if (!isFinite(x)) return "0.00";
  try{
    return x.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  }catch(e){
    return (Math.round(x*100)/100).toFixed(2);
  }
}
function fmtRM(n){ return "RM " + fmt2(n); }
// DOM helpers (some older versions used $ / $$)
function $(sel, root){ return (root||document).querySelector(sel); }
function $$(sel, root){ return Array.from((root||document).querySelectorAll(sel)); }
// ---------------------------------------------------------------------------
function loadStore(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    const d = raw ? JSON.parse(raw) : {};
    d.settings ??= {theme:'galaxy'};
    d.agents ??= [];
    d.customers ??= [];
    d.products ??= [];
    d.orders ??= [];
    d.transactions ??= [];
    return d;
  }catch(e){
    return {settings:{theme:'galaxy'}, agents:[], customers:[], products:[], orders:[], transactions:[]};
  }
}
function saveStore(d){ localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
let DB = loadStore();

/* ===== Domain helpers ===== */
const braSizes = ()=>{
  const bands=[70,75,80,85,90], cups=['A','B','C','D'];
  const out=[];
  for(const b of bands){
    for(const c of cups){
      if(b===90 && (c==='A'||c==='B')) continue;
      out.push(`${b}${c}`);
    }
  }
  return out;
};
const letterSizes = ['S','M','L','XL','XXL','XXXL'];

function byId(list,id){ return list.find(x=>x.id===id)||null; }
function money(n){ return `RM ${fmtMoney(n)}`; }

function orderItemsTotal(order, field){
  // field: 'agentPriceMYR' | 'retailPriceMYR' etc
  let sum = 0;
  (order.items||[]).forEach(it=>{
    const qty = Number(it.qty||0) || 0;
    if(!qty) return;

    // 兜底：单价=0 视为“自动”，改用商品默认价（若有）
    let unit = Number(it[field] ?? 0) || 0;
    if(unit <= 0){
      const p = (DB.products||[]).find(p=>p.id===it.productId);
      if(p){
        const fb = Number(p[field] ?? 0) || 0;
        if(fb>0) unit = fb;
      }
    }
    sum += unit * qty;
  });
  return sum;
}
function agentOrderDebit(order){
  const goods = orderItemsTotal(order,'agentPriceMYR');
  const intl = Number(order.intlShipMYR||0);
  return goods + intl*0.5;
}
function agentOrderProfit(order){
  const goods = orderItemsTotal(order,'agentPriceMYR');
  const cost  = orderItemsTotal(order,'costMYR');
  const cn    = Number(order.cnShipMYR||0);
  const fwd   = Number(order.fwdShipMYR||0);
  const intl  = Number(order.intlShipMYR||0);
  // 净利 = (代理价-进货价) - 国内运费(全扣) - 国际运费(我承担一半)
  return goods - cost - (cn+fwd) - intl*0.5;
}
function retailOrderRevenue(order){
  return orderItemsTotal(order,'retailPriceMYR');
}
function retailOrderProfit(order){
  const sales = orderItemsTotal(order,'retailPriceMYR');
  const cost = orderItemsTotal(order,'costMYR');
  const cn = Number(order.cnShipMYR||0);
  const fwd = Number(order.fwdShipMYR||0);
  return sales - cost - cn - fwd;
}

function txSum(agentId){
  return DB.transactions.filter(t=>t.agentId===agentId).reduce((s,t)=> s + Number(t.amountMYR||0), 0);
}

function ymd(d){
  if(d==null) return '';
  if(typeof d==='string'){
    const s=d.trim();
    if(!s) return '';
    let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
    m=s.match(/^(\d{4})[\/\.](\d{1,2})[\/\.](\d{1,2})/);
    if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
    const dt=new Date(s);
    if(!isNaN(dt.getTime())) return ymd(dt);
    return '';
  }
  if(typeof d==='number'){
    const dt=new Date(d);
    if(!isNaN(dt.getTime())) return ymd(dt);
    return '';
  }
  if(d instanceof Date){
    if(isNaN(d.getTime())) return '';
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,'0');
    const day=String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  if(typeof d==='object'){
    const y=d.y ?? d.year;
    const m=d.m ?? d.month;
    const day=d.d ?? d.day;
    if(y && m && day) return `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }
  return '';
}

function ymdShift(ymd, deltaDays){
  // ymd: 'YYYY-MM-DD'
  if(!ymd) return '';
  const d = new Date(ymd + 'T00:00:00');
  d.setDate(d.getDate() + deltaDays);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function txSumAsOf(agentId, ymdInclusive){
  const k = _dateKey(ymdInclusive);
  if(!k) return 0;
  return (DB.transactions||[])
    .filter(t=>t.agentId===agentId && _dateKey(t.date) && _dateKey(t.date) <= k)
    .reduce((s,t)=>{
      const amt = Number(t.amountMYR)||0;
      if(t.kind==='DEBIT') return s - Math.abs(amt);
      return s + amt;
    },0);
}

function sumInRange(agentId, kinds, fromYmd, toYmd){
  const fk = fromYmd ? _dateKey(fromYmd) : 0;
  const tk = toYmd ? _dateKey(toYmd) : 99999999;
  return (DB.transactions||[])
    .filter(t=>t.agentId===agentId && kinds.includes(t.kind))
    .filter(t=>{
      const dk = _dateKey(t.date);
      return dk && dk >= fk && dk <= tk;
    })
    .reduce((s,t)=>{
      const amt = Number(t.amountMYR)||0;
      if(t.kind==='DEBIT') return s + Math.abs(amt);
      return s + amt;
    },0);
}

function computeSettlement(agentId, fromYmd=null, toYmd=null){
  // Returns settlement for a period.
  // paid/unpaid are calculated for THIS period (not lifetime), but endBalance is as-of toYmd.
  const startCut = fromYmd ? ymdShift(fromYmd, -1) : null;
  const startBalance = fromYmd ? txSumAsOf(agentId, startCut) : 0;
  const endBalance = toYmd ? txSumAsOf(agentId, toYmd) : txSum(agentId);

  const due = sumInRange(agentId, ['DEBIT'], fromYmd, toYmd);
  const inflow = sumInRange(agentId, ['TOPUP','ADJUST'], fromYmd, toYmd);

  const oldOutstanding = Math.max(0, -startBalance);
  const newOutstanding = Math.max(0, -endBalance);
  const unpaid = Math.max(0, newOutstanding - oldOutstanding);
  const paid = Math.max(0, due - unpaid);

  return { startBalance, endBalance, due, inflow, paid, unpaid, oldOutstanding, newOutstanding };
}

function esc(v){
  if (v === null || v === undefined) return '';
  return String(v)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// Back-compat alias used throughout the file
function escapeHtml(v){ return esc(v); }
// Escape + allow line breaks
function escBr(v){ return escapeHtml(v).replace(/\n/g,'<br>'); }

// Robust numeric parser for RM inputs (accepts numbers or strings like "RM 25.00")
function rmNum(v){
  if (typeof v === 'number' && Number.isFinite(v)) return v;
  const s = String(v ?? '').trim();
  const n = Number(s.replace(/[^0-9.\-]/g,''));
  return Number.isFinite(n) ? n : 0;
}

/* ===== Filters ===== */
function applyOrderFilters(orders){
  const {type, agentId, from, to, q} = state.orderFilters;
  const q2 = (q||'').trim().toLowerCase();
  return orders.filter(o=>{
    if(type!=='ALL' && o.type!==type) return false;
    if(agentId!=='ALL' && o.agentId!==agentId) return false;
    if(from && (o.date||'') < from) return false;
    if(to && (o.date||'') > to) return false;
    if(q2){
      const agent = byId(DB.agents,o.agentId)?.name || '';
      const cust = byId(DB.customers,o.customerId)?.name || '';
      const items = (o.items||[]).map(it=> `${it.sku||it.name||''} ${it.size||''} ${it.color||''} ${it.note||''}`).join(' ');
      const hay = (agent+' '+cust+' '+items+' '+(o.note||'')).toLowerCase();
      if(!hay.includes(q2)) return false;
    }
    return true;
  });
}

/* ===== Editors ===== */
function optionList(list, selectedId, placeholder){
  const ph = placeholder ? `<option value="">${safe(placeholder)}</option>` : '';
  return ph + list.map(x=> `<option value="${x.id}" ${selectedId===x.id?'selected':''}>${safe(x.name)}</option>`).join('');
}

      </div>
      <div>
        <label>日期</label>
        <input id="od" type="date" value="${todayISO()}">
      </div>
    </div>
    <p class="hint">代理单：隐藏进货价；利润只在“老板利润单”里看。</p>
  `, `
    <button class="btn" id="cancel">取消</button>
    <button class="btn good" id="go">下一步</button>
  `);
  qs('#cancel').onclick = modalClose;
  qs('#go').onclick = ()=>{
    const type = qs('#ot').value;
    const date = qs('#od').value || todayISO();
    modalClose();
    openOrderEditor(null, {type, date});
  };
}

function productSizeOptions(p){
  if(!p) return [];
  if(p.sizeType==='BRA') return braSizes();
  if(p.sizeType==='LETTER') return letterSizes;
  return (p.customSizes||[]).length ? p.customSizes : [];
}

function openOrderEditor(id, preset=null){
  const isNew = !id;
  let o = isNew ? {
    id: uid(),
    type: preset?.type || 'AGENT',
    date: preset?.date || todayISO(),
    agentId:'',
    customerId:'',
    items:[],
    paidMYR: 0,
    cnShipMYR: 0,
    intlShipMYR: 0,
    fwdShipMYR: 0,
    note:'',
    createdAt: Date.now()
  } : (DB.orders.find(x=>x.id===id) || null);

  if(!o){ toast('找不到该订单'); return; }
  if(!o.items) o.items=[];

  const isAgent = o.type==='AGENT';

  const agentField = isAgent ? `
    <div>
      <label>代理 *</label>
      <select id="oAgent">${optionList(DB.agents, o.agentId, '（选择代理）')}</select>
    </div>
  ` : `
    <div>
      <label>顾客（可空）</label>
      <select id="oCust">${optionList(DB.customers, o.customerId, '（选择顾客）')}</select>
    </div>
  `;

  const shipFields = isAgent ? `
    <div>
      <label>中国内地运费（你承担，RM）</label>
      <input id="oCnShip" type="number" step="0.01" value="${safe(o.cnShipMYR)}">
    </div>
    <div>
      <label>国际运费（总额，RM；一人一半）</label>
      <input id="oIntlShip" type="number" step="0.01" value="${safe(o.intlShipMYR)}">
    </div>
  ` : `
    <div>
      <label>中国内地运费（你承担，RM）</label>
      <input id="oCnShip" type="number" step="0.01" value="${safe(o.cnShipMYR)}">
    </div>
    <div>
      <label>转运/国际运费（你承担，RM）</label>
      <input id="oFwdShip" type="number" step="0.01" value="${safe(o.fwdShipMYR)}">
    </div>
  `;

  modalOpen(isNew?'新增订单':'编辑订单', `
    <div class="row">
      <div>
        <label>日期 *</label>
        <input id="oDate" type="date" value="${safe(o.date||todayISO())}">
      </div>
      <div>
        <label>类型</label>
        <select id="oType" ${isNew?'':'disabled'}>
          <option value="AGENT" ${o.type==='AGENT'?'selected':''}>代理单</option>
          <option value="RETAIL" ${o.type==='RETAIL'?'selected':''}>零售单</option>
        </select>
      </div>
      ${agentField}
      <div>
        <label>已收款（RM）</label>
        <input id="oPaid" type="number" step="0.01" value="${safe(o.paidMYR||0)}">
      </div>
    </div>

    <div class="divider"></div>
    <div class="row">
      ${shipFields}
    </div>

    <div class="divider"></div>

    <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;">
      <div>
        <h2 style="margin:0; font-size:14px;">商品明细</h2>
        <p class="sub" style="margin:4px 0 0;">每行包含：SKU/商品、尺码、颜色、数量、单价（代理价/零售价）</p>
      </div>
      <button class="btn good" id="btnAddItem">＋ 加一行</button>
    </div>

    <div id="itemsBox" style="margin-top:10px; display:grid; gap:10px;"></div>

    <div class="divider"></div>
    <div class="kpi" id="kpiBox"></div>

    <div class="divider"></div>
    <div>
      <label>备注（可空）</label>
      <textarea id="oNote" placeholder="例如：补差、改地址、颜色说明…">${safe(o.note||'')}</textarea>
    </div>
  `, `
    ${isNew ? '' : `<button class="btn danger" id="oDel">删除</button>`}
    <button class="btn" id="oCancel">取消</button>
    <button class="btn primary" id="oSave">保存</button>
  `, isAgent ? '代理单（隐藏进货价给代理）' : '零售单（两段运费你承担）');

  function drawItems(){
    const box = qs('#itemsBox');
    box.innerHTML = (o.items||[]).map((it, idx)=>{
      const p = byId(DB.products, it.productId);
      const sizeOpts = productSizeOptions(p);
      const colorList = (p?.colors||[]).map(c=>`<option value="${safe(c)}"></option>`).join('');
      const prodOpts = DB.products
        .slice().sort((a,b)=> ((a.category||'')+(a.name||'')).localeCompare((b.category||'')+(b.name||'')))
        .map(pp=> `<option value="${pp.id}" ${it.productId===pp.id?'selected':''}>${safe(pp.category||'未分类')} · ${safe(pp.name||'')}</option>`)
        .join('');

      const showAgent = isAgent;
      const unitLabel = showAgent ? '代理单价（RM）' : '零售价（RM）';

      return `
        <div class="card" style="box-shadow:none;">
          <div class="bd">
            <div class="row">
              <div>
                <label>商品</label>
                <select data-k="productId" data-i="${idx}">
                  <option value="">（选择商品）</option>
                  ${prodOpts}
                </select>
              </div>
              <div>
                <label>SKU（可空）</label>
                <input data-k="sku" data-i="${idx}" placeholder="例如：BC4668" value="${safe(it.sku||p?.sku||'')}">
              </div>
            </div>
            <div class="row" style="margin-top:10px;">
              <div>
                <label>尺码</label>
                <select data-k="size" data-i="${idx}">
                  <option value="">（选择尺码）</option>
                  ${sizeOpts.map(s=>`<option value="${safe(s)}" ${it.size===s?'selected':''}>${safe(s)}</option>`).join('')}
                </select>
              </div>
              <div>
                <label>颜色</label>
                <input list="c${idx}" data-k="color" data-i="${idx}" placeholder="例如：黑/肤/紫" value="${safe(it.color||'')}">
                <datalist id="c${idx}">${colorList}</datalist>
              </div>
              <div>
                <label>数量</label>
                <input type="number" step="1" min="1" data-k="qty" data-i="${idx}" value="${safe(it.qty||1)}">
              </div>
              <div>
                <label>${unitLabel}</label>
                <input type="number" step="0.01" data-k="${showAgent?'agentPriceMYR':'retailPriceMYR'}" data-i="${idx}" value="${safe(showAgent?it.agentPriceMYR:it.retailPriceMYR)}">
              </div>
            </div>
            <div class="row" style="margin-top:10px;">
              <div>
                <label>你的进货价（RM，老板用）</label>
                <input type="number" step="0.01" data-k="costMYR" data-i="${idx}" value="${safe(it.costMYR||0)}">
              </div>
              <div style="flex:0 0 auto; min-width:110px;">
                <label>&nbsp;</label>
                <button class="btn danger" data-del-item="${idx}">删</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    qsa('[data-k]').forEach(inp=>{
      inp.onchange = (e)=>{
        const i = Number(inp.getAttribute('data-i'));
        const k = inp.getAttribute('data-k');
        const val = (inp.type==='number') ? Number(inp.value||0) : inp.value;
        o.items[i][k] = val;

        if(k==='productId'){
          const p = byId(DB.products, val);
          o.items[i].name = p?.name || '';
          o.items[i].category = p?.category || '';
          // default prices
          if(o.type==='AGENT'){
            if(!o.items[i].agentPriceMYR) o.items[i].agentPriceMYR = Number(p?.agentPriceMYR||0);
          }else{
            if(!o.items[i].retailPriceMYR) o.items[i].retailPriceMYR = Number(p?.retailPriceMYR||0);
          }
          if(!o.items[i].costMYR) o.items[i].costMYR = Number(p?.costMYR||0);
          if(!o.items[i].sku) o.items[i].sku = p?.sku || '';
          // refresh entire card to update size options / colors list
          drawItems();
          drawKPIs();
          return;
        }

        drawKPIs();
      };
      inp.oninput = inp.onchange;
    });

    qsa('[data-del-item]').forEach(btn=>{
      btn.onclick = ()=>{
        const i = Number(btn.getAttribute('data-del-item'));
        o.items.splice(i,1);
        drawItems();
        drawKPIs();
      };
    });
  }

  function drawKPIs(){
    // shipping fields may not yet be copied into o
    o.date = qs('#oDate').value || o.date;
    if(o.type==='AGENT') o.agentId = qs('#oAgent')?.value || '';
    if(o.type==='RETAIL') o.customerId = qs('#oCust')?.value || '';
    o.paidMYR = Number(qs('#oPaid').value||0);
    o.cnShipMYR = Number(qs('#oCnShip').value||0);
    if(o.type==='AGENT') o.intlShipMYR = Number(qs('#oIntlShip').value||0);
    if(o.type==='RETAIL') o.fwdShipMYR = Number(qs('#oFwdShip').value||0);
    o.note = qs('#oNote').value || '';

    const k = qs('#kpiBox');
    if(o.type==='AGENT'){
      const goods = orderItemsTotal(o,'agentPriceMYR');
      const debit = agentOrderDebit(o);
      const profit = agentOrderProfit(o);
      const due = Math.max(0, debit - Number(o.paidMYR||0));
      k.innerHTML = `
        <div class="box"><p class="t">代理货款（不含运费）</p><p class="v money">RM ${fmtMoney(goods)}</p></div>
        <div class="box"><p class="t">国际运费（代理承担一半）</p><p class="v money">RM ${fmtMoney(Number(o.intlShipMYR||0)*0.5)}</p></div>
        <div class="box"><p class="t">本单应付（扣余额）</p><p class="v money">RM ${fmtMoney(debit)}</p></div>
        <div class="box"><p class="t">未收款（订单内）</p><p class="v money ${due>0?'warnc':'pos'}">RM ${fmtMoney(due)}</p></div>
        <div class="box"><p class="t">本单毛利（老板看）</p><p class="v money ${profit>=0?'pos':'neg'}">RM ${fmtMoney(profit)}</p></div>
      `;
    }else{
      const sales = retailOrderRevenue(o);
      const profit = retailOrderProfit(o);
      const due = Math.max(0, sales - Number(o.paidMYR||0));
      k.innerHTML = `
        <div class="box"><p class="t">零售额（不含运费）</p><p class="v money">RM ${fmtMoney(sales)}</p></div>
        <div class="box"><p class="t">两段运费（你承担）</p><p class="v money">RM ${fmtMoney(Number(o.cnShipMYR||0)+Number(o.fwdShipMYR||0))}</p></div>
        <div class="box"><p class="t">未收款（订单内）</p><p class="v money ${due>0?'warnc':'pos'}">RM ${fmtMoney(due)}</p></div>
        <div class="box"><p class="t">本单毛利（老板看）</p><p class="v money ${profit>=0?'pos':'neg'}">RM ${fmtMoney(profit)}</p></div>
      `;
    }
  }

  // initial draw
  if(o.items.length===0){
    o.items.push({id:uid(), productId:'', sku:'', name:'', category:'', size:'', color:'', qty:1, agentPriceMYR:0, retailPriceMYR:0, costMYR:0, note:''});
  }
  drawItems();
  drawKPIs();

  qs('#btnAddItem').onclick = ()=>{
    o.items.push({id:uid(), productId:'', sku:'', name:'', category:'', size:'', color:'', qty:1, agentPriceMYR:0, retailPriceMYR:0, costMYR:0, note:''});
    drawItems();
    drawKPIs();
    // scroll to bottom of modal body
    el('modalBody').scrollTop = el('modalBody').scrollHeight;
  };

  qs('#oCancel').onclick = modalClose;
  qsa('#oDate,#oPaid,#oCnShip,#oIntlShip,#oFwdShip,#oNote,#oAgent,#oCust').forEach(x=>{
    if(!x) return;
    x.oninput = drawKPIs;
    x.onchange = drawKPIs;
  });

  qs('#oSave').onclick = ()=>{
    // validate
    const d = qs('#oDate').value || todayISO();
    o.date = d;
    o.paidMYR = Number(qs('#oPaid').value||0);
    o.cnShipMYR = Number(qs('#oCnShip').value||0);
    if(o.type==='AGENT'){
      o.agentId = qs('#oAgent').value || '';
      o.intlShipMYR = Number(qs('#oIntlShip').value||0);
      if(!o.agentId){ toast('请选择代理'); return; }
    }else{
      o.customerId = qs('#oCust')?.value || '';
      o.fwdShipMYR = Number(qs('#oFwdShip').value||0);
    }
    o.note = qs('#oNote').value || '';

    // clean items (require product + qty)
    o.items = (o.items||[]).filter(it=> it.productId && Number(it.qty||0)>0);
    if(o.items.length===0){ toast('至少添加一行商品'); return; }

    // "落地保存"：把当时商品名字类目也写入
    o.items = o.items.map(it=>{
      const p = byId(DB.products,it.productId);
      return {
        ...it,
        sku: (it.sku||p?.sku||'').toString(),
        name: it.name || p?.name || '',
        category: it.category || p?.category || '',
        size: it.size || '',
        color: it.color || '',
        qty: Number(it.qty||0),
        agentPriceMYR: Number(it.agentPriceMYR||0),
        retailPriceMYR: Number(it.retailPriceMYR||0),
        costMYR: Number(it.costMYR||0)
      };
    });

    // save order
    const idx = DB.orders.findIndex(x=>x.id===o.id);
    if(idx>=0) DB.orders[idx] = o;
    else DB.orders.push(o);

    // auto create/update DEBIT for agent orders (balance system)
    if(o.type==='AGENT'){
      const debitAmount = -agentOrderDebit(o);
      let tx = DB.transactions.find(t=> t.kind==='DEBIT' && t.relatedOrderId===o.id);
      if(!tx){
        tx = {id:uid(), date:o.date, agentId:o.agentId, kind:'DEBIT', amountMYR: debitAmount, note: ['订单扣款', (o.orderNo||o.ref|| (o.id ? ('#'+String(o.id).slice(-6).toUpperCase()) : '')), (o.date||''), (o.note||'')].filter(Boolean).join(' · '), relatedOrderId:o.id, createdAt:Date.now()};
        DB.transactions.push(tx);
      }else{
        tx.date = o.date;
        tx.agentId = o.agentId;
        tx.amountMYR = debitAmount;
      }
    }

    saveStore(DB);
    modalClose();
    toast('已保存');
    render();
  };

  if(!isNew){
    qs('#oDel').onclick = ()=>{
      // delete order and its debit
      DB.orders = DB.orders.filter(x=>x.id!==o.id);
      DB.transactions = DB.transactions.filter(t=> !(t.kind==='DEBIT' && t.relatedOrderId===o.id));
      saveStore(DB);
      modalClose();
      toast('已删除');
      render();
    };
  }
}

function openAgentEditor(id){

  if(!a){ toast('找不到代理'); return; }
  modalOpen(isNew?'新增代理':'编辑代理', `

        <input id="an" placeholder="例如：Jun" value="${safe(a.name)}">
      </div>

    <div>
      <label>备注（可空）</label>

      期初余额/欠款：按你的规则用【资金流水→调整】录入（可正可负）。

    <button class="btn" id="ac">取消</button>
    <button class="btn primary" id="as">保存</button>
  `);

  qs('#ac').onclick = modalClose;

    const name = (qs('#an').value||'').trim();
    if(!name){ toast('请输入代理名称'); return; }
    a.name = name;
    a.phone = qs('#ap').value||'';
    a.note = qs('#at').value||'';

    if(idx>=0) DB.agents[idx]=a; else DB.agents.push(a);
    saveStore(DB);
    modalClose();
    toast('已保存');
    render();
  };

  if(!isNew){
    qs('#adel').onclick = ()=>{
      // soft delete: keep orders but unlink
      DB.agents = DB.agents.filter(x=>x.id!==a.id);
      DB.orders = DB.orders.map(o=> o.agentId===a.id ? ({...o, agentId:''}) : o);
      DB.transactions = DB.transactions.filter(t=> t.agentId!==a.id);
      saveStore(DB);
      modalClose();
      toast('已删除');
      render();
    };
  }
}

function openAgentDetail(id){
  const a = byId(DB.agents,id);
  if(!a){ toast('找不到代理'); return; }
  const bal = txSum(a.id);
  const orders = DB.orders.filter(o=>o.type==='AGENT' && o.agentId===a.id).sort((x,y)=> (y.date||'').localeCompare(x.date||''));
  const txs = DB.transactions.filter(t=>t.agentId===a.id).sort((x,y)=> (y.date||'').localeCompare(x.date||''));
  const profit = orders.reduce((s,o)=> s + agentOrderProfit(o), 0);

  modalOpen(`代理：${a.name}`, `
    <div class="kpi">
      <div class="box"><p class="t">当前余额</p><p class="v money ${bal>=0?'pos':'neg'}">RM ${fmtMoney(bal)}</p></div>
      <div class="box"><p class="t">代理单数</p><p class="v money">${orders.length}</p></div>
      <div class="box"><p class="t">毛利（老板看）</p><p class="v money ${profit>=0?'pos':'neg'}">RM ${fmtMoney(profit)}</p></div>
    </div>
    <div class="divider"></div>
    <div class="row">
      <div><button class="btn good" id="topup">💳 充值</button></div>
      <div><button class="btn warn" id="adj">🧾 调整/期初</button></div>
      <div><button class="btn" id="stmt">📄 对账单</button></div>
    </div>
    <div class="divider"></div>
    <h2 style="margin:0 0 8px; font-size:14px;">最近订单</h2>
    <div class="list">
      ${orders.slice(0,6).map(o=>{
        const amount = agentOrderDebit(o);
        const p = agentOrderProfit(o);
        const brief = (o.items||[]).slice(0,2).map(it=> `${safe(it.sku||it.name||'')}${it.size?('·'+safe(it.size)):""}${it.color?('·'+safe(it.color)):""}×${it.qty}`).join('；');
        return `
          <div class="item" data-oo="${o.id}">
            <div class="a">
              <p class="name">🧾 ${safe(o.date)} · 扣 RM ${fmtMoney(amount)}</p>
              <p class="meta"><span>${brief}${(o.items||[]).length>2?'…':''}</span></p>
            </div>
            <div class="b"><div class="money ${p>=0?'pos':'neg'}">毛利 RM ${fmtMoney(p)}</div></div>
          </div>
        `;
      }).join('') || `<div class="muted">暂无订单</div>`}
    </div>
    <div class="divider"></div>
    <h2 style="margin:0 0 8px; font-size:14px;">资金流水（最近）</h2>
    <div class="list">
      ${txs.slice(0,6).map(t=>{
        const cls = Number(t.amountMYR||0)>=0 ? 'pos' : 'neg';
        return `
          <div class="item" data-open-tx="${t.id}">
            <div class="a">
              <p class="name">💳 ${safe(t.kind)} · ${safe(t.date||'')}</p>
              <p class="meta">${t.note?`<span>${safe(t.note)}</span>`:''}</p>
            </div>
            <div class="b"><div class="money ${cls}">${Number(t.amountMYR||0)>=0?'+':''}RM ${fmtMoney(t.amountMYR)}</div></div>
          </div>
        `;
      }).join('') || `<div class="muted">暂无流水</div>`}
    </div>
  `, `
    <button class="btn" id="edit">编辑代理</button>
    <button class="btn" id="close">关闭</button>
  `);

  qs('#close').onclick = modalClose;
  qs('#edit').onclick = ()=> { modalClose(); openAgentEditor(a.id); };
  qs('#topup').onclick = ()=> { modalClose(); openFundEditor({kind:'TOPUP', agentId:a.id}); };
  qs('#adj').onclick = ()=> { modalClose(); openFundEditor({kind:'ADJUST', agentId:a.id}); };
  qs('#stmt').onclick = ()=> { modalClose(); openStatementPicker(a.id); };
  qsa('[data-oo]').forEach(n=> n.onclick = ()=> { modalClose(); openOrderEditor(n.getAttribute('data-oo')); });
  qsa('[data-open-tx]').forEach(n=> n.onclick = ()=> { modalClose(); openFundEditor(n.getAttribute('data-open-tx')); });
}

function openLedgerPage(agentId, from, to){
  const agent = (DB.agents||[]).find(a=>a.id===agentId) || {name: agentId};
  const txs = (DB.transactions||[]).filter(t=>t.agentId===agentId);

  const inRange = (d)=>{
    if(!d) return true;
    if(from && d < from) return false;
    if(to && d > to) return false;
    return true;
  };

  // 按日期排序（同日保持稳定）
  const sorted = txs.slice().sort((a,b)=>{
    return String(a.date||'').localeCompare(String(b.date||'')) || String(a.id||'').localeCompare(String(b.id||''));
  });

  // 期初余额：开始日期之前的累计
  let opening = 0;
  if(from){
    sorted.forEach(t=>{
      if(String(t.date||'') < from) opening += (Number(t.amountMYR||0) || 0);
    });
  }
  let bal = opening;

  const rows = [];
  sorted.forEach(t=>{
    const d = String(t.date||'');
    if(!inRange(d)) return;

    const amt = Number(t.amountMYR||0) || 0;
    let debit = '';
    let credit = '';
    if(amt < 0) debit = money(Math.abs(amt));
    if(amt > 0) credit = money(amt);

    bal += amt;

    rows.push({
      d: d || '—',
      particulars: ledgerParticulars(t),
      debit,
      credit,
      balance: money(bal),
    });
  });

  const rangeTxt = `${from || '全部'} ~ ${to || '全部'}`;
  const gen = todayStr();
  const closing = money(bal);

  const thead = `
    <thead>
      <tr>
        <th style="width:110px;">Date</th>
        <th>Particulars</th>
        <th style="width:120px; text-align:right;">Debit</th>
        <th style="width:120px; text-align:right;">Credit</th>
        <th style="width:120px; text-align:right;">Balance</th>
      </tr>
    </thead>`;

  const tbody = `
    <tbody>
      <tr>
        <td>${h(from ? from : '—')}</td>
        <td><b>Opening balance</b></td>
        <td style="text-align:right;"></td>
        <td style="text-align:right;"></td>
        <td style="text-align:right;"><b>${money(opening)}</b></td>
      </tr>
      ${rows.map(r=>`
        <tr>
          <td>${h(r.d)}</td>
          <td style="white-space:pre-wrap;">${r.particulars}</td>
          <td style="text-align:right;">${r.debit||''}</td>
          <td style="text-align:right;">${r.credit||''}</td>
          <td style="text-align:right;">${r.balance}</td>
        </tr>
      `).join('')}
    </tbody>`;

  const html = `
  <div class="statementOverlay">
    <div class="statementTopbar">
      <button class="btn primary" id="ledgerPrintBtn">下载PDF</button>
      <button class="btn" id="ledgerBackBtn">返回</button>
    </div>

    <div class="statementSheet">
      <div class="statementHeader">
        <div class="statementTitle">代理账本</div>
        <div class="statementMeta"><b>代理：</b> ${h(agent.name||agentId)} ｜ <b>日期：</b> ${h(rangeTxt)}</div>
        <div class="statementMeta">期初余额：${money(opening)} ｜ 期末余额：${closing}</div>
      </div>

      <table class="statementTable">
        ${thead}
        ${tbody}
      </table>

      <div class="statementFoot">
        说明：Debit=扣款（支出），Credit=充值（收入），Balance=累计余额。订单扣款会优先显示订单号/日期/备注。
      </div>
    </div>
  </div>
  `;

  // 复用对账单的全屏样式与打印逻辑
  const host = document.createElement('div');
  host.className = 'statementHost';
  host.innerHTML = html;
  document.body.appendChild(host);

  const back = ()=>{
    host.remove();
  };

  qs('#ledgerBackBtn').onclick = back;
  qs('#ledgerPrintBtn').onclick = ()=>{
    document.body.classList.add('printing');
    setTimeout(()=>{
      window.print();
      setTimeout(()=>document.body.classList.remove('printing'), 300);
    }, 50);
  };
}

function ledgerParticulars(t){
  const kind = t.kind || '';
  // 订单扣款：展示更“正式账本”的明细（订单号/日期/备注）
  if(kind === 'DEBIT' && t.relatedOrderId){
    const o = (DB.orders||[]).find(x=>x.id===t.relatedOrderId);
    if(o){
      const ref = (o.orderNo||o.ref|| (o.id ? ('#'+String(o.id).slice(-6).toUpperCase()) : ''));
      const date = o.date || t.date || '';
      const note = o.note ? ` · ${h(o.note)}` : '';
      const items = (o.items||[]).map(it=>{
        const p = (DB.products||[]).find(p=>p.id===it.productId);
        const code = (p?.code || it.sku || it.productId || '').toString();
        const size = (it.size||'').toString();
        const color = (it.color||'').toString();
        const qty = Number(it.qty||0) || 0;
        const left = [code, size, color].filter(Boolean).join('·');
        return left ? `${left}${qty?('×'+qty):''}` : '';
      }).filter(Boolean);
      const brief = items.slice(0,4).join('；') + (items.length>4 ? '…' : '');
      const briefTxt = brief ? `\n${h(brief)}` : '';
      return `订单扣款 · ${h(ref)} · ${h(date)}${note}${briefTxt}`;
    }
  }

  const map = { TOPUP:'充值', ADJUST:'调整', DEBIT:'扣款' };
  const base = map[kind] || '流水';
  const note = t.note ? ` · ${h(t.note)}` : '';
  return `${base}${note}`;
}

// 简单 HTML 转义
function h(s){
  return String(s ?? '').replace(/[&<>"']/g, m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m]));
}


function openStatementPage(agentId, orders, fromDate, toDate, mode){
  // Back-compat: allow passing a single options object
  if(typeof agentId === 'object' && agentId){
    ({agentId, orders, fromDate, toDate, mode} = agentId);
  }
  const agent = DB.agents.find(a=>a.id===agentId) || {name: agentId};
  let fromYmd = (fromDate && fromDate.ymd) ? fromDate.ymd : ymd(fromDate);
  let toYmd = (toDate && toDate.ymd) ? toDate.ymd : ymd(toDate);
  if(!fromYmd) fromYmd = '0000-01-01';
  if(!toYmd) toYmd = ymd(new Date());
  const MODE = String(mode||'AGENT').toUpperCase();

  // Boss mode -> profit sheet
  if(MODE === 'BOSS'){
    return openProfitStatementPage({agentId, orders, fromDate, toDate});
  }

  // ===== Agent Statement (itemized, agent-facing) =====
  const openingYmd = ymdShift(fromYmd, -1);
  const openingBal = txSumAsOf(agentId, openingYmd);
  const closingBal = txSumAsOf(agentId, toYmd);

  const txs = (DB.transactions||[])
    .filter(t=>t.agentId===agentId && t.date>=fromYmd && t.date<=toYmd)
    .sort((a,b)=> (a.date||'').localeCompare(b.date||'') || (a.kind||'').localeCompare(b.kind||''));

  // Rows: {type:'data'|'date', date, desc, calc, amt, cum}
  const dataRows = [];
  let cum = Number(openingBal||0);
  let goodsPayable = 0;
  let shipPayable  = 0;


  const pushData = (date, desc, calc, amt)=>{
    cum += Number(amt||0);
    dataRows.push({type:'data', date: date||'', desc, calc, amt:Number(amt||0), cum});
  };

  // First row must be opening balance
  dataRows.push({type:'data', date:'', desc:'上期余额', calc:'', amt:Number(openingBal||0), cum:Number(openingBal||0)});

  txs.forEach(tx=>{
    const kind = String(tx.kind||'').toUpperCase();
    const amt  = Number(tx.amountMYR||0);
    const date = tx.date || '';

    // Expand linked order DEBIT into per-item rows (same order date)
    if(kind === 'DEBIT' && tx.relatedOrderId){
      const o = (DB.orders||[]).find(x=>x.id===tx.relatedOrderId);
      if(o){
        const od = o.date || date || '';
        const items = Array.isArray(o.items) ? o.items : [];
        if(items.length){
          items.forEach(it=>{
            const qty  = Number(it.qty||0);
            const unit = Number(it.agentPriceMYR ?? it.priceMYR ?? 0);
            const line = -(unit * qty);

            goodsPayable += (unit * qty);

            const rawSku = (it.sku||'').toString().trim();
            const pid    = (it.productId||'').toString().trim();
            const sku    = rawSku || (pid && pid.length<=14 ? pid : '');
            const nm     = (it.name||'').toString().trim();
            const head   = [sku, nm].filter(Boolean).join(' · ') || (nm || '货品');
            const attr = [it.size||'', it.color||''].filter(Boolean).join(' · ');
            const desc = attr ? `${head}
${attr}` : head;

            const calc = `RM ${fmt2(unit)} × ${qty}`; // 日期移到上面分组显示
            pushData(od, desc, calc, line);
          });

          // Intl shipping (代理承担一半)
          const intl = Number(o.intlShipMYR || 0);
          const half = intl * 0.5;
          if(half){
            const calc = `RM ${fmt2(intl)} ÷ 2`;
            pushData(od, '国际运费（你承担一半）', calc, -half);
          }
          shipPayable += half;
        }else{
          // Fallback: single row
          pushData(od, tx.note || '订单扣款', '', amt);
        }
        return;
      }
      // linked order missing -> fall back
      pushData(date, tx.note || '订单扣款', '', amt);
      return;
    }

    // Other tx (TOPUP / ADJUST / DEBIT)
    const base =
      kind === 'TOPUP' ? '充值' :
      kind === 'ADJUST' ? '调整/期初' :
      kind === 'DEBIT' ? '扣款' :
      '流水';

    if(kind==='DEBIT' || (kind==='ADJUST' && amt<0)) goodsPayable += Math.abs(amt);
    // 计算栏只放数额/倍数，日期统一用分组行
    pushData(date, base + (tx.note ? `：${tx.note}` : ''), '', amt);
  });

  const totalDebit = txs.filter(t=>{
    const k = String(t.kind||'').toUpperCase();
    const a = Number(t.amountMYR||0);
    return k==='DEBIT' || (k==='ADJUST' && a<0);
  }).reduce((s,t)=> s + Math.abs(Number(t.amountMYR||0)), 0);

  const rangeTxt = (()=>{
    // 仅显示本次对账单里出现的日期（下单/充值/调整/扣款等）

    const b = ds[ds.length-1] || a;

  // Insert date separator rows (skip the opening balance row)
  const renderRows = [];

  dataRows.forEach((r, i)=>{

function openProfitStatementPage(opts){
  const agentId = opts.agentId;
  const agent = DB.agents.find(a=>a.id===agentId) || {name: agentId};
  let fromYmd = (opts.fromDate && opts.fromDate.ymd) ? opts.fromDate.ymd : ymd(opts.fromDate);
  let toYmd = (opts.toDate && opts.toDate.ymd) ? opts.toDate.ymd : ymd(opts.toDate);
  if(!fromYmd) fromYmd = '0000-01-01';
  if(!toYmd) toYmd = ymd(new Date());

  // Orders in range for this agent
  const os = (DB.orders||[])
    .filter(o=>o.agentId===agentId && o.date>=fromYmd && o.date<=toYmd)
    .sort((a,b)=> (a.date||'').localeCompare(b.date||'') || String(a.id||'').localeCompare(String(b.id||'')));

  // Rows: {type:'data'|'date', date, desc, calc, amt, cum}
  const dataRows = [];
  let cum = 0;

  const pushData = (date, desc, calc, amt)=>{
    cum += Number(amt||0);
    dataRows.push({type:'data', date: date||'', desc, calc: calc||'', amt:Number(amt||0), cum});
  };

  let totalGross = 0; // sum of item gross profits
  let totalShip  = 0; // my shipping costs (cn + fwd + intl/2)
  let totalNet   = 0;

  os.forEach(o=>{
    const od = o.date || '';
    const items = Array.isArray(o.items) ? o.items : [];

    items.forEach(it=>{
      const qty  = Number(it.qty||0);
      const sell = Number(it.agentPriceMYR ?? it.priceMYR ?? 0);
      const cost = Number(it.costMYR ?? 0);
      const gp   = (sell - cost) * qty;

      totalGross += gp;

      const rawSku = (it.sku||'').toString().trim();
      const pid    = (it.productId||'').toString().trim();
      const sku    = rawSku || (pid && pid.length<=14 ? pid : '');
      const nm     = (it.name||'').toString().trim();
      const head   = [sku, nm].filter(Boolean).join(' · ') || (nm || '货品');
      const attr   = [it.size||'', it.color||''].filter(Boolean).join(' · ');
      const desc   = attr ? `${head}\n${attr}` : head;

      const calc = `订单 RM ${fmt2(sell)} × ${qty} ｜ 进货 RM ${fmt2(cost)} × ${qty}`;
      pushData(od, desc, calc, gp);
    });

    // Shipping costs (扣我自己的成本)
    const cn   = Number(o.cnShipMYR||0);
    const fwd  = Number(o.fwdShipMYR||0);
    const intl = Number(o.intlShipMYR||0);
    const intlMine = intl * 0.5;

    const shipCost = cn + fwd + intlMine;
    totalShip += shipCost;

    if(cn){
      pushData(od, '国内运费', `RM ${fmt2(cn)}`, -cn);
    }
    if(fwd){
      pushData(od, '国内转运/中转', `RM ${fmt2(fwd)}`, -fwd);
    }
    if(intlMine){
      pushData(od, '国际运费（我承担一半）', `RM ${fmt2(intl)} ÷ 2`, -intlMine);
    }
  });

  totalNet = totalGross - totalShip;

  const rangeTxt = (()=>{
    const ds = os.map(o=>o.date).filter(Boolean).sort();
    const a = ds[0] || fromYmd;
    const b = ds[ds.length-1] || a;
    return (a===b) ? a : `${a} ~ ${b}`;
  })();

  // Insert date separator rows
  const renderRows = [];
  let lastDate = '';
  dataRows.forEach(r=>{
    const d = r.date || '';
    if(d && d !== lastDate){
      renderRows.push({type:'date', date:d});
      lastDate = d;
    }
    renderRows.push(r);
  });

  const overlay = document.createElement('div');
  overlay.className = 'statementOverlay';
  overlay.innerHTML = `
    <div class="statementTopbar">
      <div style="display:flex; gap:10px; align-items:center;">
        <button class="sbtn primary" id="pfPrint">下载PDF</button>
        <button class="sbtn" id="pfClose">返回</button>
      </div>
      <div class="hint">老板利润单：显示进货价与毛利/运费/净利（代理版不显示）。</div>
    </div>

    <div class="statementSheet" id="profitSheet">
      <div class="statementBody">
        <div class="statementTitle">老板利润单</div>
        <div class="statementMeta">
          <span><b>代理：</b> ${escapeHtml(agent.name||agentId)}</span>
          <span><b>日期：</b> ${escapeHtml(rangeTxt)}</span>
        </div>

        <div class="statementCards">
          <div class="statementCard">
            <div class="k">毛利（代理价 - 进货价）</div>
            <div class="v ${totalGross>=0?'green':'red'}">RM ${fmt2(totalGross)}</div>
          </div>

          <div class="statementCard">
            <div class="k">运费成本（国内 + 国际一半）</div>
            <div class="v ${totalShip<=0?'green':'orange'}">RM ${fmt2(totalShip)}</div>
            <div class="k" style="margin-top:6px">本卡为“成本合计”，明细在下表。</div>
          </div>

          <div class="statementCard" style="grid-column: span 2">
            <div class="k">净利</div>
            <div class="v ${totalNet>=0?'green':'red'}">RM ${fmt2(totalNet)}</div>
          </div>
        </div>

        <table class="statementTable">
          <thead>
            <tr>
              <th class="col-seq">序号</th>
              <th class="col-desc">明细</th>
              <th class="col-calc">价格/计算</th>
              <th class="col-amt" style="text-align:right">本行</th>
              <th class="col-cum" style="text-align:right">累计净利</th>
            </tr>
          </thead>
          <tbody>
            ${(()=>{
              let n = 0;
              if(!renderRows.length){
                return `<tr><td colspan="5" style="padding:14px 10px;color:#667">该日期范围内没有订单记录。</td></tr>`;
              }
              return renderRows.map(r=>{
                if(r.type==='date'){
                  return `<tr class="stmtDateRow"><td colspan="5">${escapeHtml(r.date)}</td></tr>`;
                }
                n += 1;
                return `
                  <tr>
                    <td>${n}</td>
                    <td class="desc">${escBr(r.desc)}</td>
                    <td class="calc">${escBr(r.calc||'')}</td>
                    <td class="amount" style="text-align:right;${r.amt<0?'color:var(--danger)':'color:var(--ok)'}">
                      ${r.amt<0?'-':''}RM ${fmt2(Math.abs(r.amt))}
                    </td>
                    <td class="amount" style="text-align:right;${r.cum<0?'color:var(--danger)':'color:var(--ok)'}">
                      ${r.cum<0?'-':''}RM ${fmt2(Math.abs(r.cum))}
                    </td>
                  </tr>
                `;
              }).join('');
            })()}
          </tbody>
        </table>

        <div class="muted" style="margin-top:10px;font-size:12px">
          规则：扣除国内运费（cnShip + fwdShip）全额；国际运费只扣我承担的一半（intlShip ÷ 2）。本表不显示“未收/余额”，只看利润。
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  overlay.querySelector('#pfClose').onclick = ()=> overlay.remove();

  overlay.querySelector('#pfPrint').onclick = ()=>{
    document.body.classList.add('printing');
    setTimeout(()=>{
      window.print();
      setTimeout(()=>document.body.classList.remove('printing'), 300);
    }, 50);
  };
}


/* ===== Backup ===== */
function download(filename, content, mime='application/octet-stream'){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 0);
}
function exportJSON(){
  const stamp = new Date().toISOString().replace(/[:.]/g,'-');
  download(`BeingFine_FinelyCup_backup_${stamp}.json`, JSON.stringify(DB, null, 2), 'application/json');
}
async function importJSON(){
  const f = qs('#fileImport').files?.[0];
  if(!f){ toast('请选择备份文件'); return; }
  try{
    const txt = await f.text();
    const d = JSON.parse(txt);
    // minimal validate
    if(!d || typeof d!=='object') throw new Error('bad');
    d.settings ??= {theme:'galaxy'};
    d.agents ??= []; d.customers ??= []; d.products ??= []; d.orders ??= []; d.transactions ??= [];
    DB = d;
    saveStore(DB);
    applyTheme(DB.settings.theme||'galaxy');
    toast('导入成功');
    render();
  }catch(e){
    toast('导入失败：文件不正确');
  }
}

function exportCSV(){
  // products
  const products = [['id','category','name','sku','sizeType','colors','agentPriceMYR','retailPriceMYR','costMYR','note']]
    .concat(DB.products.map(p=>[
      p.id, p.category||'', p.name||'', p.sku||'', p.sizeType||'', (p.colors||[]).join('|'),
      Number(p.agentPriceMYR||0), Number(p.retailPriceMYR||0), Number(p.costMYR||0), (p.note||'').replace(/\n/g,' ')
    ]));
  // orders
  const orders = [['id','type','date','agentId','customerId','paidMYR','cnShipMYR','intlShipMYR','fwdShipMYR','note','items_json']]
    .concat(DB.orders.map(o=>[
      o.id, o.type, o.date||'', o.agentId||'', o.customerId||'',
      Number(o.paidMYR||0), Number(o.cnShipMYR||0), Number(o.intlShipMYR||0), Number(o.fwdShipMYR||0),
      (o.note||'').replace(/\n/g,' '),
      JSON.stringify(o.items||[])
    ]));
  // transactions
  const txs = [['id','date','agentId','kind','amountMYR','note','relatedOrderId']]
    .concat(DB.transactions.map(t=>[
      t.id, t.date||'', t.agentId||'', t.kind||'', Number(t.amountMYR||0),
      (t.note||'').replace(/\n/g,' '), t.relatedOrderId||''
    ]));

  const toCSV = (rows)=> rows.map(r=> r.map(x=>{
    const s = (x??'').toString();
    if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
    return s;
  }).join(',')).join('\n');

  download('products.csv', toCSV(products), 'text/csv');
  download('orders.csv', toCSV(orders), 'text/csv');
  download('transactions.csv', toCSV(txs), 'text/csv');
}

      // 补字段（尽量不改用户已有数值）

      icons: [
        { src: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='192' height='192'><rect width='192' height='192' rx='40' fill='%238b5cf6'/><text y='130' x='38' font-size='110'>🐾</text></svg>", sizes: "192x192", type: "image/svg+xml" },
        { src: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512'><rect width='512' height='512' rx='100' fill='%238b5cf6'/><text y='360' x='90' font-size='300'>🐾</text></svg>", sizes: "512x512", type: "image/svg+xml" }
      ]
    };
    try{
      const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
      const url = URL.createObjectURL(blob);
      document.getElementById('pwaManifest').href = url;
    }catch(e){}
  })();

  /* ===== Galaxy Stars ===== */
  (function(){
    function buildStars(){
      const bg = document.getElementById('starsBg');
      if(!bg) return;
      bg.innerHTML = '';
      const count = 80;
      for(let i=0; i<count; i++){
        const s = document.createElement('span');
        s.className = 'star';
        const size = Math.random()*2.5 + 0.8;
        s.style.cssText = [
          `left:${Math.random()*100}%`,
          `top:${Math.random()*100}%`,
          `width:${size}px`,
          `height:${size}px`,
          `--dur:${(Math.random()*3+2).toFixed(1)}s`,
          `--delay:${(Math.random()*4).toFixed(1)}s`,
          `--max-op:${(Math.random()*0.5+0.3).toFixed(2)}`
        ].join(';');
        bg.appendChild(s);
      }
    }
    buildStars();
  })();

  /* ===== Splash dismiss ===== */
  (function(){
    const splash = document.getElementById('splash');
    if(!splash) return;
    setTimeout(()=>{ splash.classList.add('hide'); }, 2000);
  })();

  window.addEventListener('error', (e)=>{
    const stack = e && e.error && e.error.stack ? e.error.stack : (e && e.message ? e.message : 'Unknown error');
    showFatal('报表加载失败', stack);
  });

  window.addEventListener('unhandledrejection', (e)=>{
    const reason = e && e.reason ? (e.reason.stack || e.reason.message || String(e.reason)) : 'Unhandled rejection';
    showFatal('报表加载失败', reason);
  });
})();


</script>
</body>
</html>
