name: Build Neko Usage Bridge APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'usage-bridge/**'
      - '.github/workflows/build-usage-bridge.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: usage-bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: neko-usage-bridge-debug-apk
          path: usage-bridge/app/build/outputs/apk/debug/app-debug.apk
