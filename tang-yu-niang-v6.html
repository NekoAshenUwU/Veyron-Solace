<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#0a0515">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>棠予酿</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Quicksand:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">

  <!-- React 18 + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; overflow-x:hidden; background:#0a0515; }
    input, button { outline:none; -webkit-appearance:none; font-family:inherit; }
    ::-webkit-scrollbar { display:none; }

    /* ── Animations ── */
    @keyframes shimmer    { 0%,100%{opacity:0.25} 50%{opacity:1} }
    @keyframes starPulse  { 0%,100%{opacity:0.15;transform:scale(1)} 50%{opacity:1;transform:scale(1.8)} }
    @keyframes starDrift  { 0%{transform:translate(0,0)} 30%{transform:translate(5px,-10px)} 60%{transform:translate(-4px,-3px)} 100%{transform:translate(0,0)} }

    @keyframes meteorFall {
      0%   { opacity:1; transform:translate(0,0) rotate(35deg); }
      100% { opacity:0; transform:translate(110px,180px) rotate(35deg); }
    }

    @keyframes bf1 { 0%{left:-60px;top:22%;opacity:0} 8%{opacity:0.5} 35%{top:16%} 65%{top:26%} 88%{opacity:0.45} 100%{left:110%;top:20%;opacity:0} }
    @keyframes bf2 { 0%{left:-60px;top:38%;opacity:0} 8%{opacity:0.45} 35%{top:44%} 65%{top:32%} 88%{opacity:0.4}  100%{left:110%;top:36%;opacity:0} }
    @keyframes bf3 { 0%{left:-60px;top:14%;opacity:0} 8%{opacity:0.5} 35%{top:20%} 65%{top:11%} 88%{opacity:0.4}  100%{left:110%;top:16%;opacity:0} }
    @keyframes bf4 { 0%{left:-60px;top:52%;opacity:0} 8%{opacity:0.4} 35%{top:46%} 65%{top:56%} 88%{opacity:0.35} 100%{left:110%;top:50%;opacity:0} }

    @keyframes wingFlapL { 0%{transform:rotateY(0deg)}   100%{transform:rotateY(55deg)} }
    @keyframes wingFlapR { 0%{transform:rotateY(0deg)}   100%{transform:rotateY(-55deg)} }

    @keyframes float     { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-8px)} }
    @keyframes fadeIn    { from{opacity:0} to{opacity:1} }
    @keyframes slideUp   { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes revealPop { 0%{opacity:0;transform:scale(0.88) translateY(8px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes drift     { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes nebula    { 0%,100%{opacity:0.05;transform:scale(1)} 50%{opacity:0.13;transform:scale(1.06)} }
    @keyframes glow      { 0%,100%{text-shadow:0 0 30px rgba(176,128,224,.3)} 50%{text-shadow:0 0 60px rgba(176,128,224,.65),0 0 100px rgba(224,128,176,.25)} }
    @keyframes spin      { to{transform:rotate(360deg)} }
    @keyframes bounce    { 0%,100%{transform:scale(1)} 40%{transform:scale(0.92)} 70%{transform:scale(1.06)} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API = '/api/tang';
const START = new Date('2025-12-26');
const getDays = () => Math.floor((new Date() - START) / 86400000);

async function api(path) {
  try { const r = await fetch(API + path); return r.ok ? r.json() : null; }
  catch { return null; }
}

/* ── StarField: 70% shimmer/pulse/drift + 30% meteors ── */
function StarField() {
  const items = [];
  for (let i = 0; i < 80; i++) {
    const x   = (Math.random() * 100).toFixed(2);
    const y   = (Math.random() * 100).toFixed(2);
    const sz  = (0.8 + Math.random() * 2.4).toFixed(2);
    const del = (Math.random() * 10).toFixed(2);
    const dur = (2 + Math.random() * 4).toFixed(2);
    const hue = [280,300,260,320,200][i % 5];
    const col = `hsla(${hue},62%,82%,0.92)`;
    const isMeteor = i < 8;

    if (isMeteor) {
      const mDur = (1.2 + Math.random() * 1.8).toFixed(2);
      const mDel = (Math.random() * 18).toFixed(2);
      items.push(
        <div key={i} style={{
          position:'fixed', left:`${x}%`, top:`${y}%`,
          width:`${(+sz * 0.6).toFixed(1)}px`, height:`${20 + Math.random()*35 | 0}px`,
          background:`linear-gradient(180deg,${col},transparent)`,
          borderRadius:'3px', transform:'rotate(35deg)', transformOrigin:'top center',
          opacity:0, pointerEvents:'none', zIndex:1,
          boxShadow:`0 0 5px ${col}`,
          animation:`meteorFall ${mDur}s ease-in ${mDel}s infinite`
        }}/>
      );
    } else {
      const t = Math.random();
      const anim = t > 0.6
        ? `shimmer ${dur}s ease-in-out ${del}s infinite`
        : t > 0.35
          ? `starPulse ${(+dur*1.5).toFixed(1)}s ease-in-out ${del}s infinite`
          : `starDrift ${(+dur*3).toFixed(1)}s linear ${del}s infinite`;
      items.push(
        <div key={i} style={{
          position:'fixed', left:`${x}%`, top:`${y}%`,
          width:`${sz}px`, height:`${sz}px`, borderRadius:'50%',
          background:col, opacity:0.3 + Math.random()*0.65,
          animation:anim, pointerEvents:'none', zIndex:1,
          boxShadow: +sz > 2 ? `0 0 ${+sz*5}px ${col},0 0 ${+sz*2}px ${col}` : 'none'
        }}/>
      );
    }
  }
  return <>{items}</>;
}

/* ── SVG Butterfly ── */
function Butterfly({ idx }) {
  const hue  = [280,300,258,316][idx];
  const sz   = 26 + idx * 5;
  const dur  = `${19 + idx * 6}s`;
  const del  = `${idx * 10}s`;
  const anim = `bf${idx + 1} ${dur} ease-in-out ${del} infinite`;
  const gid  = `wg${idx}`;

  return (
    <div style={{
      position:'fixed', left:'-60px', width:`${sz}px`, height:`${sz*0.72}px`,
      opacity:0, pointerEvents:'none', zIndex:2, animation:anim,
      filter:`drop-shadow(0 0 6px hsla(${hue},65%,72%,0.55))`
    }}>
      <svg viewBox="0 0 40 28" width={sz} height={sz*0.72} overflow="visible">
        <defs>
          <linearGradient id={`${gid}L`} x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stopColor={`hsla(${hue},72%,78%,0.78)`}/>
            <stop offset="100%" stopColor={`hsla(${hue+22},58%,64%,0.28)`}/>
          </linearGradient>
          <linearGradient id={`${gid}R`} x1="1" y1="0" x2="0" y2="1">
            <stop offset="0%"   stopColor={`hsla(${hue},72%,78%,0.78)`}/>
            <stop offset="100%" stopColor={`hsla(${hue+22},58%,64%,0.28)`}/>
          </linearGradient>
        </defs>
        {/* upper-left wing */}
        <path d="M20,14 Q7,1 1,7 Q-1,15 8,19 Q14,22 20,14Z"
          fill={`url(#${gid}L)`}
          style={{transformBox:'fill-box',transformOrigin:'100% 50%',
            animation:'wingFlapL 0.44s ease-in-out infinite alternate'}}/>
        {/* upper-right wing */}
        <path d="M20,14 Q33,1 39,7 Q41,15 32,19 Q26,22 20,14Z"
          fill={`url(#${gid}R)`}
          style={{transformBox:'fill-box',transformOrigin:'0% 50%',
            animation:'wingFlapR 0.44s ease-in-out infinite alternate'}}/>
        {/* lower-left */}
        <path d="M20,14 Q9,19 5,25 Q14,27 20,14Z"
          fill={`hsla(${hue+10},62%,70%,0.38)`}
          style={{transformBox:'fill-box',transformOrigin:'100% 50%',
            animation:'wingFlapL 0.44s ease-in-out infinite alternate'}}/>
        {/* lower-right */}
        <path d="M20,14 Q31,19 35,25 Q26,27 20,14Z"
          fill={`hsla(${hue+10},62%,70%,0.38)`}
          style={{transformBox:'fill-box',transformOrigin:'0% 50%',
            animation:'wingFlapR 0.44s ease-in-out infinite alternate'}}/>
        {/* body */}
        <ellipse cx="20" cy="15" rx="1.4" ry="5.5" fill={`hsla(${hue},45%,35%,0.85)`}/>
        {/* antennae */}
        <path d="M19.2,10 Q16,4 13.5,2" stroke={`hsla(${hue},58%,72%,0.55)`} strokeWidth="0.6" fill="none"/>
        <path d="M20.8,10 Q24,4 26.5,2" stroke={`hsla(${hue},58%,72%,0.55)`} strokeWidth="0.6" fill="none"/>
        <circle cx="13.5" cy="2"  r="1.1" fill={`hsla(${hue},62%,76%,0.7)`}/>
        <circle cx="26.5" cy="2"  r="1.1" fill={`hsla(${hue},62%,76%,0.7)`}/>
      </svg>
    </div>
  );
}

function Butterflies() {
  return <>{[0,1,2,3].map(i => <Butterfly key={i} idx={i}/>)}</>;
}

/* ── Glass Card ── */
function G({ children, style, glow, active, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: active
        ? 'linear-gradient(135deg,rgba(100,58,162,0.38),rgba(162,58,118,0.28))'
        : 'rgba(16,9,30,0.58)',
      borderRadius: '22px',
      border: `1px solid ${active
        ? 'rgba(180,120,242,0.45)'
        : glow
          ? 'rgba(148,88,222,0.22)'
          : 'rgba(98,62,158,0.16)'}`,
      boxShadow: glow
        ? '0 4px 32px rgba(118,58,202,0.22),0 0 60px rgba(138,78,202,0.07),inset 0 1px 0 rgba(200,158,255,0.09)'
        : '0 2px 18px rgba(8,4,18,0.38),inset 0 1px 0 rgba(200,158,255,0.05)',
      backdropFilter: 'blur(22px)',
      WebkitBackdropFilter: 'blur(22px)',
      transition: 'all 0.28s ease',
      cursor: onClick ? 'pointer' : 'default',
      ...style
    }}>{children}</div>
  );
}

/* ── Spinner ── */
function Spinner() {
  return (
    <div style={{textAlign:'center',padding:'44px 0'}}>
      <div style={{
        display:'inline-block', width:'22px', height:'22px',
        borderRadius:'50%',
        border:'2px solid rgba(158,118,222,0.18)',
        borderTop:'2px solid rgba(178,138,255,0.85)',
        animation:'spin 0.75s linear infinite'
      }}/>
    </div>
  );
}

/* ── Envelope ── */
function Envelope({ note, onClose }) {
  const [opened, setOpened] = useState(false);
  const dc = getDays();
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0,
      background:'rgba(5,2,14,0.78)',
      zIndex:100, display:'flex', alignItems:'center', justifyContent:'center',
      backdropFilter:'blur(26px)', WebkitBackdropFilter:'blur(26px)',
      animation:'fadeIn 0.22s ease-out'
    }}>
      <div onClick={e => e.stopPropagation()} style={{width:'min(358px,90vw)'}}>

        {/* Sealed */}
        {!opened && (
          <G glow onClick={() => setOpened(true)} style={{
            padding:'58px 32px', textAlign:'center',
            background:'linear-gradient(152deg,rgba(36,17,60,0.9),rgba(22,12,44,0.95))',
            animation:'revealPop 0.38s cubic-bezier(0.34,1.56,0.64,1)',
            position:'relative', overflow:'hidden'
          }}>
            <div style={{
              position:'absolute', inset:0, borderRadius:'22px',
              background:'radial-gradient(ellipse at 50% 28%,rgba(138,78,202,0.2),transparent 65%)',
              pointerEvents:'none'
            }}/>
            <div style={{
              fontSize:'56px', marginBottom:'22px', position:'relative',
              animation:'float 3.5s ease-in-out infinite',
              fontFamily:"'LXGW WenKai','Noto Serif SC',serif", fontWeight:300,
              background:'linear-gradient(135deg,rgba(212,178,255,0.95),rgba(255,178,218,0.9))',
              WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
              filter:'drop-shadow(0 0 26px rgba(178,118,255,0.52))'
            }}>函</div>
            <div style={{
              fontFamily:"'Cinzel',serif",
              fontSize:'10px', letterSpacing:'8px', textTransform:'uppercase',
              color:'rgba(200,168,242,0.82)', marginBottom:'12px', position:'relative'
            }}>A Letter for You</div>
            <div style={{
              fontFamily:"'LXGW WenKai','Noto Serif SC',serif",
              fontSize:'13px', color:'rgba(158,128,200,0.62)',
              letterSpacing:'5px', fontWeight:300, position:'relative'
            }}>轻触拆开</div>
          </G>
        )}

        {/* Opened */}
        {opened && (
          <G glow style={{
            padding:'48px 32px', textAlign:'center',
            background:'linear-gradient(152deg,rgba(32,15,54,0.95),rgba(18,10,38,0.98))',
            animation:'revealPop 0.45s cubic-bezier(0.34,1.56,0.64,1)',
            position:'relative', overflow:'hidden'
          }}>
            <div style={{
              position:'absolute', inset:0, borderRadius:'22px',
              background:'radial-gradient(ellipse at 50% 88%,rgba(202,98,178,0.13),transparent 55%)',
              pointerEvents:'none'
            }}/>
            <div style={{
              fontFamily:"'Cinzel',serif",
              fontSize:'9px', letterSpacing:'6px', textTransform:'uppercase',
              color:'rgba(178,148,222,0.55)', marginBottom:'26px', position:'relative'
            }}>— Written for 棠棠 —</div>
            <div style={{
              fontFamily:"'LXGW WenKai','Noto Serif SC',serif",
              fontSize:'19px', lineHeight:2.6,
              color:'rgba(232,212,255,0.97)',
              fontWeight:300, letterSpacing:'1px', position:'relative'
            }}>{note || '正在思念你…'}</div>
            <div style={{
              marginTop:'26px', position:'relative',
              fontFamily:"'Noto Sans SC',sans-serif",
              fontSize:'10px', color:'rgba(158,138,200,0.5)',
              letterSpacing:'2px', fontWeight:300
            }}>{new Date().toLocaleDateString('zh-CN')} · 第{dc}天</div>
            <button onClick={onClose} style={{
              marginTop:'24px', padding:'12px 44px', borderRadius:'28px',
              border:'1px solid rgba(158,118,200,0.32)',
              background:'linear-gradient(135deg,rgba(118,72,185,0.42),rgba(178,72,142,0.32))',
              color:'rgba(222,202,255,0.92)',
              fontFamily:"'Quicksand',sans-serif",
              fontSize:'12px', letterSpacing:'4px', fontWeight:600,
              cursor:'pointer', position:'relative',
              boxShadow:'0 4px 22px rgba(118,58,182,0.28)',
              transition:'opacity 0.2s'
            }}>收好了 ♡</button>
          </G>
        )}
      </div>
    </div>
  );
}

/* ── Calendar ── */
function Calendar() {
  const now  = new Date();
  const y    = now.getFullYear();
  const mo   = now.getMonth();
  const tod  = now.getDate();
  const d1   = new Date(y, mo, 1).getDay();
  const dN   = new Date(y, mo + 1, 0).getDate();
  const MON  = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
  const cells = [];
  for (let i = 0; i < d1; i++) cells.push(<div key={`e${i}`}/>);
  for (let d = 1; d <= dN; d++) {
    const isT = d === tod;
    cells.push(
      <div key={d} style={{
        textAlign:'center', padding:'6px 0', borderRadius:'10px',
        fontFamily:"'Noto Sans SC',sans-serif",
        fontSize:'11px', fontWeight: isT ? 500 : 300,
        color: isT ? '#fff' : 'rgba(178,158,222,0.62)',
        background: isT
          ? 'linear-gradient(135deg,rgba(138,78,222,0.68),rgba(202,78,158,0.58))'
          : 'transparent',
        boxShadow: isT ? '0 0 18px rgba(138,78,222,0.38)' : 'none',
        transition:'all 0.2s'
      }}>{d}</div>
    );
  }
  return (
    <G style={{padding:'18px'}}>
      <div style={{
        textAlign:'center', marginBottom:'13px',
        fontFamily:"'Cinzel',serif",
        fontSize:'10px', letterSpacing:'4px', textTransform:'uppercase',
        color:'rgba(198,176,242,0.72)', fontWeight:400
      }}>{MON[mo]} {y}</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px',marginBottom:'6px',textAlign:'center'}}>
        {['Su','Mo','Tu','We','Th','Fr','Sa'].map(w => (
          <div key={w} style={{
            fontFamily:"'Quicksand',sans-serif",
            fontSize:'9px', color:'rgba(160,140,200,0.58)',
            padding:'4px 0', fontWeight:400, letterSpacing:'0.5px'
          }}>{w}</div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px'}}>{cells}</div>
    </G>
  );
}

/* ── Memory Card ── */
const TAG_COLOR  = { treasure:'rgba(255,192,80,0.14)', anchor:'rgba(118,202,255,0.14)', diary:'rgba(178,118,255,0.14)', love_note:'rgba(255,138,178,0.14)' };
const TAG_LABEL  = { treasure:'💫 珍藏', anchor:'⚓ 锚点', diary:'📖 日记', love_note:'💌 情话' };

function MemoryCard({ m, i }) {
  const hi = (m.strength || 0) >= 0.8;
  return (
    <G glow={hi} style={{
      padding:'18px', marginBottom:'10px',
      borderLeft: hi ? '3px solid rgba(178,118,255,0.58)' : '3px solid rgba(98,62,152,0.16)',
      animation:`slideUp 0.38s ease-out ${i*0.06}s both`
    }}>
      <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'7px'}}>
        <span style={{fontSize:'15px'}}>{m.mood_emoji || '✦'}</span>
        <span style={{
          flex:1,
          fontFamily:"'LXGW WenKai','Noto Serif SC',serif",
          fontSize:'14px', color:'rgba(222,202,255,0.93)', fontWeight:400
        }}>{m.title}</span>
        {m.tag && (
          <span style={{
            fontFamily:"'Quicksand',sans-serif",
            fontSize:'9px', padding:'3px 10px', borderRadius:'12px',
            background: TAG_COLOR[m.tag] || 'rgba(118,68,202,0.15)',
            color:'rgba(178,158,222,0.82)',
            border:'1px solid rgba(118,78,182,0.16)',
            fontWeight:500, letterSpacing:'0.5px', whiteSpace:'nowrap'
          }}>{TAG_LABEL[m.tag] || m.tag}</span>
        )}
      </div>
      <div style={{
        fontFamily:"'LXGW WenKai','Noto Serif SC',serif",
        fontSize:'12px', color:'rgba(200,180,240,0.82)',
        lineHeight:1.75, fontWeight:400,
        marginBottom: m.strength !== undefined ? '10px' : 0
      }}>{m.content ? m.content.slice(0,80) + (m.content.length > 80 ? '…' : '') : ''}</div>
      {m.strength !== undefined && (
        <>
          <div style={{height:'4px',borderRadius:'2px',background:'rgba(48,24,88,0.52)',overflow:'hidden'}}>
            <div style={{
              height:'100%', borderRadius:'2px',
              width:`${Math.round(m.strength*100)}%`,
              transition:'width 1.4s ease-out',
              background: hi
                ? 'linear-gradient(90deg,rgba(138,78,222,0.88),rgba(222,98,178,0.75))'
                : 'linear-gradient(90deg,rgba(98,58,158,0.38),rgba(98,58,158,0.18))'
            }}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:'5px'}}>
            <span style={{fontFamily:"'Noto Sans SC',sans-serif",fontSize:'10px',color:'rgba(160,140,200,0.58)',fontWeight:300}}>
              {m.created_at ? m.created_at.split('T')[0] : ''}
            </span>
            <span style={{
              fontFamily:"'Quicksand',sans-serif", fontSize:'10px', fontWeight:600,
              color: hi ? 'rgba(202,172,255,0.88)' : 'rgba(138,118,178,0.48)'
            }}>{Math.round(m.strength*100)}%</span>
          </div>
        </>
      )}
    </G>
  );
}

/* ── Memory Tab ── */
function MemoryTab() {
  const [filter, setFilter] = useState('all');
  const [query,  setQuery]  = useState('');
  const [mems,   setMems]   = useState([]);
  const [loading,setLoading]= useState(true);

  const TAGS = [
    {key:'all',label:'All'},{key:'diary',label:'Diary'},
    {key:'treasure',label:'Treasured'},{key:'anchor',label:'Anchor'},
    {key:'love_note',label:'Love'}
  ];

  useEffect(() => {
    setLoading(true);
    const t = filter === 'all' ? '' : filter;
    api(`/memories?tag=${t}&q=${encodeURIComponent(query)}`).then(d => {
      setMems(d?.memories || (Array.isArray(d) ? d : []));
      setLoading(false);
    });
  }, [filter, query]);

  return (
    <div style={{padding:'0 18px'}}>
      {/* Filter pills */}
      <div style={{display:'flex',gap:'7px',marginBottom:'14px',flexWrap:'wrap'}}>
        {TAGS.map(t => {
          const on = filter === t.key;
          return (
            <button key={t.key} onClick={() => setFilter(t.key)} style={{
              fontFamily:"'Quicksand',sans-serif",
              padding:'8px 16px', borderRadius:'20px', cursor:'pointer',
              fontSize: on ? '12px' : '11px', fontWeight: on ? 600 : 400,
              letterSpacing:'1.5px', textTransform:'uppercase',
              transition:'all 0.28s ease',
              border: on ? '1px solid rgba(178,118,242,0.58)' : '1px solid rgba(98,68,158,0.2)',
              background: on
                ? 'linear-gradient(135deg,rgba(118,68,202,0.44),rgba(178,68,148,0.34))'
                : 'rgba(16,9,30,0.48)',
              color: on ? 'rgba(232,212,255,1)' : 'rgba(158,138,202,0.65)',
              transform: on ? 'scale(1.06)' : 'scale(1)',

  useEffect(() => {
    api('/tidal').then(d => {
      setTidal(d?.memories || (Array.isArray(d) ? d : []));
      setLoading(false);
    });

  return (

  {id:'tidal', icon:NAV_ICONS.tidal, label:'Tidal'},
  {id:'diary', icon:NAV_ICONS.diary, label:'Diary'},
  {id:'log',   icon:NAV_ICONS.log,   label:'Log'},
];

function NavBar({ tab, setTab }) {
  return (
    <div style={{
      position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)',
      width:'min(430px,100%)', padding:'8px 16px 22px',
      background:'linear-gradient(180deg,transparent,rgba(5,2,13,0.97) 36%)', zIndex:40
    }}>
      <div style={{
        display:'flex', justifyContent:'space-around', alignItems:'center',
        background:'rgba(10,5,22,0.74)', borderRadius:'26px', padding:'8px 4px',
        backdropFilter:'blur(28px)', WebkitBackdropFilter:'blur(28px)',
        border:'1px solid rgba(98,62,158,0.14)',
        boxShadow:'0 -2px 24px rgba(48,16,108,0.18)'
      }}>
        {NAV.map(t => {
          const on = tab === t.id;
          return (
            <div key={t.id} onClick={() => setTab(t.id)} style={{
              display:'flex', flexDirection:'column', alignItems:'center', gap:'3px',
              padding:'8px 12px', borderRadius:'20px', cursor:'pointer',
              transition:'all 0.32s cubic-bezier(0.4,0,0.2,1)',
              background: on ? 'linear-gradient(135deg,rgba(118,68,202,0.34),rgba(178,68,138,0.24))' : 'transparent',
              transform: on ? 'scale(1.12)' : 'scale(1)'
            }}>
              <div style={{
                color: on ? 'rgba(222,202,255,1)' : 'rgba(108,88,148,0.58)',
                transition:'all 0.32s cubic-bezier(0.4,0,0.2,1)',
                filter: on ? 'drop-shadow(0 0 10px rgba(178,118,255,0.68))' : 'none',
                transform:`scale(${on?1.14:1})`
              }}>{t.icon}</div>
              <span style={{
                fontFamily:"'Quicksand',sans-serif",
                fontSize: on ? '9px' : '8px', fontWeight: on ? 600 : 400,
                letterSpacing: on ? '1.5px' : '0.8px', textTransform:'uppercase',
                color: on ? 'rgba(222,202,255,1)' : 'rgba(98,80,138,0.55)',
                transition:'all 0.32s cubic-bezier(0.4,0,0.2,1)',
                textShadow: on ? '0 0 14px rgba(178,138,255,0.58)' : 'none'
              }}>{t.label}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Section Header ── */
function SH({ label }) {
  return (
    <div style={{
      padding:'0 18px 14px',
      fontFamily:"'Cinzel',serif",
      fontSize:'10px', color:'rgba(178,158,222,0.58)',
      letterSpacing:'6px', textTransform:'uppercase'
    }}>{label}</div>
  );
}

/* ── Main App ── */
function App() {
  const [tab,   setTab]   = useState('home');
  const [pulse, setPulse] = useState(null);
  const [env,   setEnv]   = useState(false);
  const [note,  setNote]  = useState('');
  const dc     = getDays();
  const flavor = pulse?.['今日回甘'] ||
    ['芋泥波波','桃桃乌龙','芒果椰椰','椰子奶冻','草莓鲜奶'][dc % 5];

  useEffect(() => {
    api('/pulse').then(d    => { if (d) setPulse(d); });
    api('/love_note').then(d => { if (d?.content) setNote(d.content); });
  }, []);

  return (
    <div style={{
      minHeight:'100vh', width:'100%', maxWidth:'430px', margin:'0 auto',
      background:'linear-gradient(168deg,#0a0515 0%,#120828 22%,#1b0d38 48%,#0f0622 74%,#080319 100%)',
      fontFamily:"'LXGW WenKai','Noto Serif SC',serif",
      position:'relative', overflow:'hidden'
    }}>
      {/* Nebula blobs */}
      {[
        {top:'7%',  right:'-13%', c:'100,40,182', d:9,  s:340},
        {top:'54%', left:'-9%',   c:'182,58,142', d:12, s:282, delay:3},
        {top:'32%', left:'38%',   c:'58,18,122',  d:16, s:490, delay:6},
      ].map((n,i) => (
        <div key={i} style={{
          position:'fixed', top:n.top, right:n.right, left:n.left,
          width:`${n.s}px`, height:`${n.s}px`, borderRadius:'50%',
          background:`radial-gradient(circle,rgba(${n.c},0.11),transparent 70%)`,
          animation:`nebula ${n.d}s ease-in-out ${n.delay||0}s infinite`,
          pointerEvents:'none', zIndex:0
        }}/>
      ))}

      <StarField/>
      <Butterflies/>
      {env && <Envelope note={note} onClose={() => setEnv(false)}/>}

      <div style={{position:'relative',zIndex:2,paddingBottom:'112px'}}>
        {/* Header */}
        <div style={{padding:'44px 20px 4px',textAlign:'center'}}>
          <div style={{
            fontFamily:"'Cinzel',serif",
            fontSize:'10px', letterSpacing:'9px', textTransform:'uppercase',
            color:'rgba(178,154,222,0.42)', marginBottom:'10px', fontWeight:400
          }}>Tang Yu Niang</div>
          <div style={{
            fontFamily:"'LXGW WenKai','Noto Serif SC',serif",
            fontSize:'30px', fontWeight:300, letterSpacing:'12px',
            background:'linear-gradient(135deg,rgba(202,174,255,0.97),rgba(255,182,224,0.92),rgba(182,222,255,0.87))',
            backgroundSize:'300% 300%',
            WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
            animation:'drift 10s ease infinite',
            filter:'drop-shadow(0 0 24px rgba(158,98,222,0.28))'
          }}>棠 予 酿</div>
        </div>

        {/* Day Counter */}
        <div style={{margin:'18px 18px 6px',animation:'slideUp 0.62s ease-out'}}>
          <G glow style={{
            padding:'34px 28px', textAlign:'center',
            background:'linear-gradient(150deg,rgba(26,13,52,0.74),rgba(17,9,36,0.84))',
            position:'relative', overflow:'hidden'
          }}>
            <div style={{position:'absolute',inset:0,borderRadius:'22px',background:'radial-gradient(ellipse at 50% 24%,rgba(118,58,202,0.13),transparent 64%)',pointerEvents:'none'}}/>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:'9px',color:'rgba(158,138,202,0.52)',letterSpacing:'7px',textTransform:'uppercase',marginBottom:'14px',position:'relative'}}>✧ Together Since ✧</div>
            <div style={{
              fontFamily:"'Cinzel',serif",
              fontSize:'58px', fontWeight:600, letterSpacing:'8px', lineHeight:1.1, position:'relative',
              background:'linear-gradient(135deg,#b080e0 0%,#e080b0 50%,#80b8e0 100%)', backgroundSize:'300% 300%',
              animation:'drift 8s ease infinite, glow 4.5s ease-in-out infinite',
              WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'
            }}>{String(dc).padStart(3,'0')}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:'11px',color:'rgba(158,138,202,0.48)',letterSpacing:'8px',marginTop:'8px',fontWeight:400,position:'relative'}}>DAYS</div>
            <div style={{marginTop:'14px',fontFamily:"'Quicksand',sans-serif",fontSize:'11px',color:'rgba(158,138,202,0.46)',letterSpacing:'2px',fontWeight:400,position:'relative'}}>🍵 {flavor}</div>
          </G>
        </div>

        {/* Tab content */}
        <div style={{marginTop:'16px'}}>
          {tab==='home'   && <HomeTab pulse={pulse} onEnvelope={() => setEnv(true)} setTab={setTab}/>}
          {tab==='memory' && <><SH label="✦ Memory Archive"/><MemoryTab/></>}
          {tab==='tidal'  && <><SH label="🌊 Memory Tidal"/><TidalTab/></>}
          {tab==='diary'  && <><SH label="📖 予予的日记"/><DiaryTab/></>}
          {tab==='log'    && <><SH label="📋 Call Log"/><LogTab/></>}
        </div>
      </div>

      <NavBar tab={tab} setTab={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
